<script>
  const GAS_API_URL = "https://script.google.com/macros/s/AKfycbw63y63Mk-wyqa1a846oBhnDTHj29dUEJznvrG52sjEtwONa6kOEzDVCy_GlnAMqPXPAg/exec";

  let session = {};
  let isDarkMode = false;
  let globalStudentCache = [];
  let globalAdminPostCache = []; 
  let isScanning = false;
  let recentScanCount = 0;
  const MAX_RECENT_SCANS = 50;
  let weeklyChart = null;
  let donutChart = null;
  let qrScanner = null;

  let currentCropper = null;
  let currentCropTarget = '';
  const croppedData = {}; 
  
  let editingPostId = null;
  let currentDiscStudentId = null;
  let stagedImages = [];

  // --- NEW: XSS Sanitization Helper ---
  function escapeHTML(str) {
      if (!str) return '';
      return str.toString().replace(/[&<>'"]/g, 
          tag => ({
              '&': '&amp;',
              '<': '&lt;',
              '>': '&gt;',
              "'": '&#39;',
              '"': '&quot;'
          }[tag] || tag)
      );
  }

  window.forceRefresh = function(targetFunc) {
      Swal.fire({ toast: true, position: 'top-end', icon: 'info', title: 'Syncing database...', showConfirmButton: false, timer: 1500 });
      targetFunc();
  }

  function apiCall(action, payload, onSuccess, onFailure) {
    payload.action = action;
    
    // Automatically inject secure token for all requests
    if (session && session.user && session.token) {
        payload.user = session.user;
        payload.token = session.token;
    }

    fetch(GAS_API_URL, { 
      method: 'POST', 
      headers: { 'Content-Type': 'text/plain;charset=utf-8' }, 
      body: JSON.stringify(payload) 
    })
    .then(response => response.json())
    .then(data => { 
      if (data.error && data.error !== false) {
          throw new Error(data.message || "Unknown Database Failure");
      }
      onSuccess(data); 
    })
    .catch(error => { 
        console.error("API Error:", error); 
        if (onFailure) {
            onFailure(error); 
        } else {
            if(error.message.includes('DENIED') || error.message.includes('Session')) {
                Swal.fire({ title: 'CLEARANCE DENIED', text: error.message, icon: 'error', background: '#1b0002', color: '#ff5252', confirmButtonColor: '#d32f2f' }).then(() => {
                    if(error.message.includes('Session')) logout();
                });
            } else {
                Swal.fire('Error', error.message, 'error');
            }
        }
    });
  }

  function createEmbed(url) {
      if (!url) return '';
      let finalUrl = url;
      if (url.includes('youtube.com/watch?v=')) {
          finalUrl = url.replace('watch?v=', 'embed/').split('&')[0];
      } else if (url.includes('youtu.be/')) {
          finalUrl = url.replace('youtu.be/', 'youtube.com/embed/');
      } else if (url.includes('drive.google.com/file/d/')) {
          finalUrl = url.replace('/view', '/preview');
      } else if (url.includes('facebook.com') || url.includes('fb.watch')) {
          finalUrl = `https://www.facebook.com/plugins/video.php?href=${encodeURIComponent(url)}&show_text=false`;
      }
      return `<iframe src="${finalUrl}" style="width:100%; height:450px; border:none; border-radius:8px;" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen></iframe>`;
  }

  document.getElementById('post-image-file').addEventListener('change', async function(e) {
    const files = e.target.files;
    if(files.length === 0) return;
    document.getElementById('image-staging-grid').innerHTML = '<span style="color:var(--text-muted); font-size:12px;"><i class="fas fa-spinner fa-spin"></i> Processing images...</span>';
    stagedImages = []; 
    for(let i=0; i < files.length; i++) {
      let b64 = await compressAutoImage(files[i]);
      stagedImages.push(b64);
    }
    renderStagingGrid();
  });

  function renderStagingGrid() {
    const grid = document.getElementById('image-staging-grid');
    grid.innerHTML = '';
    stagedImages.forEach((b64, idx) => {
      let isCover = (idx === 0);
      let border = isCover ? 'border: 3px solid var(--army-gold);' : 'border: 1px solid var(--border);';
      let coverBadge = isCover ? `<div style="position:absolute; top:0; left:0; background:var(--army-gold); color:#000; font-size:10px; font-weight:bold; padding:2px 5px; z-index:10;">COVER</div>` : '';
      let makeCoverBtn = isCover ? '' : `<button type="button" style="padding:4px; font-size:10px; margin-top:5px; background:var(--bg); color:var(--text); border:1px solid var(--border);" onclick="setCoverImage(${idx})">Set as Cover</button>`;
      grid.innerHTML += `<div style="position:relative; width: 100px; display:flex; flex-direction:column; animation: fadeUp 0.3s ease;"><div style="width:100px; height:100px; overflow:hidden; border-radius:4px; ${border} position:relative;">${coverBadge}<img src="${b64}" style="width:100%; height:100%; object-fit:cover;"></div>${makeCoverBtn}</div>`;
    });
  }

  window.setCoverImage = function(idx) {
    let selected = stagedImages.splice(idx, 1)[0];
    stagedImages.unshift(selected); 
    renderStagingGrid();
  }

  function formatHashtags(text) {
    if (!text) return "";
    return text.replace(/(#\w+)/g, '<span style="color:var(--army-gold); font-weight:800;">$1</span>');
  }

  function exportTableToExcel(tableId, filename) {
    let table = document.getElementById(tableId).closest('table');
    let rows = table.querySelectorAll('tr');
    
    if (rows.length <= 1) return Swal.fire('Notice', 'No data available to export.', 'info');

    let aoa = []; 

    let headerRow = [];
    let headers = rows[0].querySelectorAll("th, td");
    for (let j = 0; j < headers.length; j++) {
      if(headers[j].querySelector('button') && j === headers.length - 1) continue; 
      headerRow.push(headers[j].innerText.trim());
    }
    aoa.push(headerRow);

    let bodyData = [];
    for (let i = 1; i < rows.length; i++) {
      let cols = rows[i].querySelectorAll("td, th");
      if (cols.length === 1 && cols[0].colSpan > 1) continue; 

      let rowArr = [];
      for (let j = 0; j < cols.length; j++) {
        if(cols[j].querySelector('button') && j === cols.length - 1) continue; 
        rowArr.push(cols[j].innerText.trim());
      }
      bodyData.push(rowArr);
    }

    if (bodyData.length === 0) return Swal.fire('Notice', 'No data available to export.', 'info');

    if (tableId === 'attendance-table' || tableId === 'masterlist-table') {
      bodyData.sort((a, b) => {
         let compA = a[2] ? a[2].toLowerCase() : "";
         let compB = b[2] ? b[2].toLowerCase() : "";
         return compA.localeCompare(compB);
      });
    }

    bodyData.forEach(r => aoa.push(r));

    let ws = XLSX.utils.aoa_to_sheet(aoa);
    let range = XLSX.utils.decode_range(ws['!ref']);

    for (let R = range.s.r; R <= range.e.r; ++R) {
      for (let C = range.s.c; C <= range.e.c; ++C) {
        let cellAddress = {c:C, r:R};
        let cellRef = XLSX.utils.encode_cell(cellAddress);
        if (!ws[cellRef]) continue;

        if (R === 0) {
          ws[cellRef].s = {
            font: { bold: true, color: { rgb: "FFFFFFFF" } },
            fill: { fgColor: { rgb: "FF2D3821" } },
            alignment: { horizontal: "center" }
          };
          continue;
        }

        let val = String(ws[cellRef].v).toUpperCase();
        if (val === "PRESENT" || val === "APPROVED") {
          ws[cellRef].s = { fill: { fgColor: { rgb: "FF388E3C" } }, font: { color: { rgb: "FFFFFFFF" }, bold: true }, alignment: { horizontal: "center" } };
        } else if (val === "LATE" || val === "PENDING") {
          ws[cellRef].s = { fill: { fgColor: { rgb: "FFF57F17" } }, font: { color: { rgb: "FFFFFFFF" }, bold: true }, alignment: { horizontal: "center" } };
        } else if (val === "VERY LATE" || val === "ABSENT" || val === "REJECTED") {
          ws[cellRef].s = { fill: { fgColor: { rgb: "FFD32F2F" } }, font: { color: { rgb: "FFFFFFFF" }, bold: true }, alignment: { horizontal: "center" } };
        }
      }
    }

    ws['!cols'] = [{wch: 15}, {wch: 30}, {wch: 20}, {wch: 15}, {wch: 15}, {wch: 15}];
    let wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "Unit Data");
    XLSX.writeFile(wb, filename + ".xlsx");
  }

  function togglePasswordVisibility() {
    const passInput = document.getElementById('login-pass');
    const toggleIcon = document.getElementById('toggle-pass-icon');
    if (passInput.type === 'password') {
      passInput.type = 'text';
      toggleIcon.classList.remove('fa-eye');
      toggleIcon.classList.add('fa-eye-slash');
    } else {
      passInput.type = 'password';
      toggleIcon.classList.remove('fa-eye-slash');
      toggleIcon.classList.add('fa-eye');
    }
  }

  window.onload = () => {
    initCropperInputs();
    const cachedBranding = JSON.parse(localStorage.getItem('scck_branding') || 'null');
    if (cachedBranding) {
      if(cachedBranding.logoUrl) { const logoImg = document.getElementById('system-logo-login'); logoImg.src = cachedBranding.logoUrl; logoImg.style.display = 'block'; }
      if(cachedBranding.bgUrl) document.getElementById('view-login').style.backgroundImage = `url('${cachedBranding.bgUrl}')`;
    }
    apiCall('getSettings', {}, (res) => {
      localStorage.setItem('scck_branding', JSON.stringify(res));
      if(res.logoUrl && !cachedBranding) { const logoImg = document.getElementById('system-logo-login'); logoImg.src = res.logoUrl; logoImg.style.display = 'block'; }
      if(res.bgUrl && !cachedBranding) document.getElementById('view-login').style.backgroundImage = `url('${res.bgUrl}')`;
    });

    const savedSession = localStorage.getItem('scck_session');
    if (savedSession) {
      try {
        const parsed = JSON.parse(savedSession);
        if (parsed.expiry > Date.now() && parsed.token) {
          session = { user: parsed.user, token: parsed.token, role: parsed.role };
          document.getElementById('view-login').style.display = 'none'; 
          document.getElementById('app-container').style.display = 'flex';
          loadUserProfile();
          setupRoleUI(parsed.role);
          updateOfflineSyncUI();
        } else {
          localStorage.removeItem('scck_session');
        }
      } catch(e) {}
    }
  };

  function setupRoleUI(role) {
    if (role === 'Super Admin' || role === 'Admin') {
      document.getElementById('sidebar-menu-admin').style.display = 'block'; 
      document.getElementById('sidebar-menu-scanner').style.display = 'none';
      
      let btnClass = document.getElementById('btn-submit-class');

      if (role === 'Super Admin') {
        if(btnClass) btnClass.innerHTML = '<i class="fas fa-check-double"></i> INSTANTLY CREATE & APPROVE CLASS';
        document.getElementById('admin-draft-section').style.display = 'none';
        document.getElementById('admin-leave-submit-section').style.display = 'none'; 
        document.querySelectorAll('.super-admin-only').forEach(el => el.style.display = 'block');
        document.querySelectorAll('.admin-only').forEach(el => el.style.display = 'none'); 
      } else {
        if(btnClass) btnClass.innerHTML = '<i class="fas fa-paper-plane"></i> SUBMIT REQUEST FOR APPROVAL';
        document.getElementById('admin-draft-section').style.display = 'block';
        document.getElementById('admin-leave-submit-section').style.display = 'flex'; 
        document.querySelectorAll('.super-admin-only').forEach(el => el.style.display = 'none');
        document.querySelectorAll('.admin-only').forEach(el => el.style.display = 'block'); 
      }
      switchTab('panel-dashboard', document.querySelectorAll('#sidebar-menu-admin button')[0]);
    } else {
      document.getElementById('sidebar-menu-admin').style.display = 'none';

  function initCropperInputs() {
    const inputs = ['prof-image-file', 'set-logo-file', 'set-nav-logo-file', 'set-bg-file', 'leg-class-logo', 'leg-off-photo'];
    inputs.forEach(id => {
      const el = document.getElementById(id);
      if(el) {
        el.addEventListener('change', function(e) {
          if (e.target.files && e.target.files[0]) {
            const reader = new FileReader();
            reader.onload = function(event) { openCropper(event.target.result, id); };
            reader.readAsDataURL(e.target.files[0]);
          }
        });
      }
    });
  }

  function openCropper(imageSrc, targetId) {
    currentCropTarget = targetId;
    const modal = document.getElementById('cropper-modal');
    const img = document.getElementById('cropper-image');
    img.src = imageSrc;
    modal.classList.add('show');
    let aspectRatio = (targetId === 'set-bg-file') ? NaN : 1; 
    if(currentCropper) currentCropper.destroy();
    currentCropper = new Cropper(img, { aspectRatio: aspectRatio, viewMode: 2, autoCropArea: 1 });
  }

  document.getElementById('btn-crop-apply').addEventListener('click', () => {
    if (!currentCropper) return;
    const canvas = currentCropper.getCroppedCanvas({ maxWidth: 800, maxHeight: 800 });
    croppedData[currentCropTarget] = canvas.toDataURL('image/png');
    let statusTextMap = { 'prof-image-file': 'prof-image-status', 'set-logo-file': 'set-logo-status', 'set-nav-logo-file': 'set-nav-logo-status', 'set-bg-file': 'set-bg-status', 'leg-class-logo': 'leg-class-status', 'leg-off-photo': 'leg-off-status' };
    let statusEl = document.getElementById(statusTextMap[currentCropTarget]);
    if(statusEl) statusEl.innerHTML = '<span style="color:var(--status-green); font-weight:bold;"><i class="fas fa-check"></i> Image Cropped & Ready</span>';
    closeCropper();
  });

  function closeCropper() {
    document.getElementById('cropper-modal').classList.remove('show');
    if(currentCropper) { currentCropper.destroy(); currentCropper = null; }
    if(!croppedData[currentCropTarget]) document.getElementById(currentCropTarget).value = '';
  }

  function compressAutoImage(file) {
    return new Promise((resolve) => {
      const reader = new FileReader();
      reader.onload = (e) => {
        const img = new Image();
        img.onload = () => {
          const canvas = document.createElement('canvas');
          const MAX_SIZE = 1080; 
          let width = img.width, height = img.height;
          if (width > MAX_SIZE || height > MAX_SIZE) {
            if (width > height) { height = Math.round((height * MAX_SIZE) / width); width = MAX_SIZE; } 
            else { width = Math.round((width * MAX_SIZE) / height); height = MAX_SIZE; }
          }
          canvas.width = width; canvas.height = height;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0, width, height);
          resolve(canvas.toDataURL('image/jpeg', 0.8)); 
        };
        img.src = e.target.result;
      };
      reader.readAsDataURL(file);
    });
  }

  function applyTheme(dark) {
    isDarkMode = dark; document.body.classList.toggle('dark-mode', dark);
    document.getElementById('theme-icon').className = dark ? 'fas fa-sun' : 'fas moon';
    document.getElementById('theme-text').innerText = dark ? 'LIGHT MODE' : 'DARK MODE';
    try { localStorage.setItem('sccks_dark', dark ? '1' : '0'); } catch(e){}
    if (weeklyChart) weeklyChart.update(); if (donutChart) donutChart.update();
  }
  function toggleTheme() { applyTheme(!isDarkMode); }

  function toggleSidebar() {
    document.querySelector('.sidebar').classList.toggle('open');
    document.getElementById('mobile-overlay').classList.toggle('show');
  }

  function switchTab(panelId, btnElement) {
    document.querySelectorAll('.view-panel').forEach(p => p.classList.remove('active-panel'));
    document.getElementById(panelId).classList.add('active-panel');
    document.querySelectorAll('.sidebar-menu button').forEach(b => b.classList.remove('active'));
    if (btnElement) btnElement.classList.add('active');

    if (window.innerWidth <= 768) toggleSidebar();
    if (panelId !== 'panel-scanner') stopScanner(false);
    
    if (['panel-dashboard','panel-attendance','panel-masterlist','panel-accounts'].includes(panelId)) loadDashboardData();
    if (panelId === 'panel-leaves') { loadLeavesData(); fetchStudentsForDropdown(); }
    if (panelId === 'panel-idcards') fetchStudentsForDropdown();
    if (panelId === 'panel-audit') loadAuditLogs();
    if (panelId === 'panel-profile') loadUserProfile();
    if (panelId === 'panel-legacy') { loadLegacyClassesForDropdown(); loadLegacyAdminData(); }
    if (panelId === 'panel-posts') loadPosts();
  }

  function loadLegacyAdminData() {
    document.getElementById('legacy-classes-tbody').innerHTML = '<tr><td colspan="4" style="text-align:center;">Loading...</td></tr>';
    document.getElementById('legacy-officers-tbody').innerHTML = '<tr><td colspan="4" style="text-align:center;">Loading...</td></tr>';
    
    apiCall('getAdminLegacyData', { user: session.user, pass: session.pass }, (res) => {
      let cHtml = '';
      res.classes.forEach(c => {
        let actionBtn = '';
        if (session.role === 'Super Admin') {
          if (c.status === 'Pending') {
            actionBtn = `
              <button class="btn-success" style="padding:4px 8px; font-size:11px; margin-right:5px;" onclick="updateLegacyClass('${c.id}','Approved')">APPROVE</button>
              <button class="btn-danger" style="padding:4px 8px; font-size:11px;" onclick="updateLegacyClass('${c.id}','Rejected')">REJECT</button>`;
          } else {
            actionBtn = `<button class="btn-danger" style="padding:4px 8px; font-size:11px;" onclick="deleteLegacyClass('${c.id}')"><i class="fas fa-trash"></i> DELETE</button>`;
          }
        }
        let bClass = c.status === 'Approved' ? 'badge-present' : (c.status === 'Pending' ? 'badge-late' : 'badge-absent');
        cHtml += `<tr>
          <td>${c.year}</td>
          <td><b>${c.name}</b></td>
          <td><span class="badge ${bClass}">${c.status}</span></td>
          <td>${actionBtn}</td>
        </tr>`;
      });
      document.getElementById('legacy-classes-tbody').innerHTML = cHtml || '<tr><td colspan="4" style="text-align:center;">No records found.</td></tr>';

      let oHtml = '';
      res.officers.forEach(o => {
        let actionBtn = session.role === 'Super Admin' ? `<button class="btn-danger" style="padding:4px 8px; font-size:11px;" onclick="deleteLegacyOfficer('${o.id}')"><i class="fas fa-trash"></i></button>` : '';
        oHtml += `<tr>
          <td>${o.classId}</td>
          <td><b>${o.rank} ${o.name}</b></td>
          <td>${o.designation}</td>
          <td>${actionBtn}</td>
        </tr>`;
      });
      document.getElementById('legacy-officers-tbody').innerHTML = oHtml || '<tr><td colspan="4" style="text-align:center;">No records found.</td></tr>';
    });
  }

  window.updateLegacyClass = function(id, status) {
    Swal.fire({ title: `Set class to ${status}?`, showCancelButton: true }).then(r => {
      if(r.isConfirmed) {
        if(session.role === 'Super Admin') {
            let blg = document.getElementById('badge-legacy');
            let count = parseInt(blg.innerText || 0) - 1;
            if(count > 0) { blg.innerText = count; } else { blg.style.display = 'none'; }
        }
        Swal.fire({ title: 'PROCESSING...', didOpen: () => Swal.showLoading() });
        apiCall('updateLegacyClassStatus', { classId: id, status: status, user: session.user, pass: session.pass }, () => {
          Swal.fire('Success', 'Status updated', 'success');
          loadLegacyAdminData();
          loadLegacyClassesForDropdown();
        });
      }
    });
  }

  window.deleteLegacyClass = function(id) {
    Swal.fire({ title: 'PERMANENTLY DELETE CLASS?', text: 'All associated data will be wiped.', icon: 'warning', showCancelButton: true, confirmButtonColor: '#d32f2f' }).then(r => {
      if(r.isConfirmed) {
        Swal.fire({ title: 'DELETING...', didOpen: () => Swal.showLoading() });
        apiCall('deleteLegacyClass', { classId: id, user: session.user, pass: session.pass }, () => {
          Swal.fire('Deleted!', 'Class removed.', 'success');
          loadLegacyAdminData();
          loadLegacyClassesForDropdown();
        });
      }
    });
  }

  window.deleteLegacyOfficer = function(id) {
    Swal.fire({ title: 'PERMANENTLY DELETE OFFICER?', icon: 'warning', showCancelButton: true, confirmButtonColor: '#d32f2f' }).then(r => {
      if(r.isConfirmed) {
        Swal.fire({ title: 'DELETING...', didOpen: () => Swal.showLoading() });
        apiCall('deleteLegacyOfficer', { offId: id, user: session.user, pass: session.pass }, () => {
          Swal.fire('Deleted!', 'Officer removed.', 'success');
          loadLegacyAdminData();
        });
      }
    });
  }


  async function submitPublicPost() {
    const title = document.getElementById('post-title').value.trim();
    const desc = document.getElementById('post-desc').value.trim();
    const vid = document.getElementById('post-video-url').value.trim();
    
    if (!title || !desc) return Swal.fire('Notice', 'Title and description are required.', 'warning');
    if (!editingPostId && stagedImages.length === 0 && !vid) return Swal.fire('Notice', 'At least one image or video URL is required.', 'warning');
    
    Swal.fire({ title: 'UPLOADING TO COMMAND...', html: 'This may take a moment...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
    
    let actionName = editingPostId ? 'resubmitPost' : 'submitPost';
    let payload = { title: title, description: desc, imageArray: stagedImages, videoUrl: vid, user: session.user, pass: session.pass };
    if (editingPostId) payload.postId = editingPostId;

    apiCall(actionName, payload, (res) => {
      Swal.fire('Success', res.message, 'success');
      cancelEdit();
      loadPosts();
    });
  }

  function editPost(id) {
    const p = globalAdminPostCache.find(x => x.id === id);
    if (!p) return;
    editingPostId = id;
    document.getElementById('post-title').value = p.title;
    document.getElementById('post-desc').value = p.description;
    document.getElementById('post-video-url').value = p.videoUrl || '';
    document.getElementById('btn-submit-post').innerHTML = '<i class="fas fa-save"></i> SUBMIT REVISED POST';
    document.getElementById('btn-cancel-edit').style.display = 'inline-block';
    
    stagedImages = [];
    document.getElementById('image-staging-grid').innerHTML = '<span style="color:var(--text-muted); font-size:12px;">Images unchanged. Select new ones below to override.</span>';
    document.getElementById('admin-draft-section').scrollIntoView({behavior: 'smooth'});
  }

  function cancelEdit() {
    editingPostId = null;
    document.getElementById('post-title').value = '';
    document.getElementById('post-desc').value = '';
    document.getElementById('post-video-url').value = '';
    document.getElementById('post-image-file').value = '';
    stagedImages = [];
    document.getElementById('image-staging-grid').innerHTML = '';
    document.getElementById('btn-submit-post').innerHTML = '<i class="fas fa-paper-plane"></i> SUBMIT DRAFT FOR APPROVAL';
    document.getElementById('btn-cancel-edit').style.display = 'none';
  }

  function renderAdminPostsHTML() {
    let html = '';
    globalAdminPostCache.forEach(p => {
      let actionBtn = '';
      let feedbackHtml = '';
      let isPinned = (p.pinned === true || p.pinned === "TRUE");
      
      let previewBtn = `<button class="btn-info" style="padding:6px 10px; font-size:11px; margin-bottom:5px; width:100%; color:#fff;" onclick="previewPost('${p.id}')"><i class="fas fa-eye"></i> PREVIEW</button>`;

      if (session.role === 'Super Admin') {
        let pinColor = isPinned ? 'var(--army-gold)' : 'var(--text-muted)';
        let pinIcon = isPinned ? 'fas fa-thumbtack' : 'fas fa-thumbtack';
        let pinTooltip = isPinned ? 'UNPIN' : 'PIN TO TOP';
        let pinBtn = `<button style="background:transparent; color:${pinColor}; border:1px solid ${pinColor}; padding:6px 10px; font-size:11px; margin-bottom:5px; width:100%;" onclick="togglePin('${p.id}')"><i class="${pinIcon}"></i> ${pinTooltip}</button>`;
        
        let deleteBtn = `<button class="btn-danger" style="padding:6px 10px; font-size:11px; margin-bottom:5px; width:100%;" onclick="deletePost('${p.id}')"><i class="fas fa-trash"></i> DELETE</button>`;

        if (p.status === 'Pending' || p.status === 'Revise') {

  window.togglePin = function(id) {

      title: 'PERMANENTLY DELETE?',

      icon: 'warning',
      showCancelButton: true,
      confirmButtonColor: '#d32f2f',

  function updatePost(id, status) {
    let feedback = document.getElementById(`feedback-${id}`) ? document.getElementById(`feedback-${id}`).value.trim() : '';
    if (status === 'Revise' && !feedback) {
      return Swal.fire('Notice', 'Please provide correction instructions for the Admin before clicking Revise.', 'warning');
    }

    Swal.fire({ title: `Set status to ${status}?`, showCancelButton: true, confirmButtonText: 'CONFIRM' }).then(r => {
      if (r.isConfirmed) {
        const postIndex = globalAdminPostCache.findIndex(x => x.id === id);
        if(postIndex !== -1) {
            globalAdminPostCache[postIndex].status = status;
            globalAdminPostCache[postIndex].feedback = feedback;
            
            if (session.role === 'Super Admin') {
                let bp = document.getElementById('badge-posts');
                let currentCount = parseInt(bp.innerText || "0");
                if(currentCount > 0) {
                    bp.innerText = currentCount - 1;
                    if(currentCount - 1 <= 0) bp.style.display = 'none';
                }
            }
        }
        
        renderAdminPostsHTML();
        Swal.fire({ toast: true, position: 'top-end', icon: 'info', title: 'Syncing to database...', showConfirmButton: false, timer: 1500 });
        apiCall('updatePostStatus', { postId: id, status: status, feedback: feedback, user: session.user, pass: session.pass }, 
        () => {
          Swal.fire({ toast: true, position: 'top-end', icon: 'success', title: 'Saved!', showConfirmButton: false, timer: 2000 });
        }, 
        () => {
          loadPosts();
        });
      }
    });
  }

  let previewSlideIdx = 0;
  function previewPost(postId) {
    const p = globalAdminPostCache.find(x => x.id === postId);
    if (!p) return;
    const images = p.image ? p.image.split(',') : [];
    previewSlideIdx = 0;
    
    let carouselHtml = '';
    let slidesArr = [];
    
    if (p.videoUrl) slidesArr.push(`<div class="preview-carousel-slide" id="prev-slide-${slidesArr.length}">${createEmbed(p.videoUrl)}</div>`);
    images.forEach(img => {
        if(img) slidesArr.push(`<div class="preview-carousel-slide" id="prev-slide-${slidesArr.length}"><img src="${img}"></div>`);
    });

    if (slidesArr.length > 0) {
        slidesArr[0] = slidesArr[0].replace('preview-carousel-slide"', 'preview-carousel-slide active"');
        let slides = slidesArr.join('');
        let btns = slidesArr.length > 1 ? `<button class="preview-carousel-btn preview-carousel-prev" onclick="changePreviewSlide(-1, ${slidesArr.length})"><i class="fas fa-chevron-left"></i></button><button class="preview-carousel-btn preview-carousel-next" onclick="changePreviewSlide(1, ${slidesArr.length})"><i class="fas fa-chevron-right"></i></button>` : '';
        let dots = slidesArr.length > 1 ? `<div class="preview-carousel-dots">` + slidesArr.map((_, i) => `<span class="preview-dot ${i === 0 ? 'active' : ''}" id="prev-dot-${i}" onclick="setPreviewSlide(${i}, ${slidesArr.length})"></span>`).join('') + `</div>` : '';
        carouselHtml = `<div class="preview-carousel-container">${slides}${btns}${dots}</div>`;
    }

    let styledDesc = formatHashtags(escapeHTML(p.description));

    const html = `
      ${carouselHtml}
      <div class="preview-post-date">${p.date}</div>
      <h2 class="preview-post-title">${escapeHTML(p.title)}</h2>
      <div class="preview-post-desc">${styledDesc}</div>
    `;
    document.getElementById('preview-dynamic-content').innerHTML = html;
    const modal = document.getElementById('post-preview-modal');
    modal.style.display = 'flex';
    setTimeout(() => modal.classList.add('show'), 10);
  }

  window.changePreviewSlide = function(step, total) { setPreviewSlide(previewSlideIdx + step, total); }
  window.setPreviewSlide = function(index, total) {
    if(index >= total) index = 0;
    if(index < 0) index = total - 1;
    document.querySelectorAll('.preview-carousel-slide').forEach(s => s.classList.remove('active'));
    document.querySelectorAll('.preview-dot').forEach(d => d.classList.remove('active'));
    document.getElementById(`prev-slide-${index}`).classList.add('active');
    if (document.getElementById(`prev-dot-${index}`)) document.getElementById(`prev-dot-${index}`).classList.add('active');
    previewSlideIdx = index;
  }

  function startScanner() { 
      const v = document.getElementById('qr-video'), m = document.getElementById('msg'); 
      m.innerText='REQUESTING HIGH-RES OPTICS...'; 
      m.style.background='rgba(232, 240, 254, 0.9)'; m.style.color='var(--army-primary)';

          });

      qrScanner.start().then(() => {

          m.innerText='OPTICS ONLINE. POINT AT QR CODE.';

          qrScanner.hasFlash().then(hasFlash => {

          });

  function toggleFlashlight() {
      if(qrScanner) {
          qrScanner.isFlashOn().then(isOn => {
              if(isOn) {
                  qrScanner.turnFlashOff();
                  document.getElementById('btn-torch').innerHTML = '<i class="fas fa-bolt"></i> TOGGLE LIGHT';

> { isScanning=false; m.innerText='OPTICS ONLINE. POINT AT QR CODE.'; m.style.background='rgba(232, 240, 254, 0.9)'; m.style.color='var(--army-primary)'; }, 3000); }, (err) => { m.innerText='COMMS LOST.'; m.style.background='rgba(211,47,47,0.9)'; isScanning=false; } ); }

            `<button id="toggle-btn-${r[0]}" style="padding:4px 8px; font-size:11px; background:transparent; border:1px solid var(--status-green); color:var(--status-green); border-radius:4px; font-weight:bold; cursor:pointer;" onclick="toggleLegacyAccess('${r[0]}', 'Granted')">ACCESS: ON</button>` : 
            `<button id="toggle-btn-${r[0]}" style="padding:4px 8px; font-size:11px; background:transparent; border:1px solid var(--status-red); color:var(--status-red); border-radius:4px; font-weight:bold; cursor:pointer;" onclick="toggleLegacyAccess('${r[0]}', 'Denied')">ACCESS: OFF</button>`;
        if(r[2] === "Super Admin") legBtn = `<span style="font-size:11px; color:var(--text-muted); font-weight:bold;">BYPASS GRANTED</span>`;

        ach+=`<tr><td>${r[0]}</td><td><b>${r[2]}</b></td><td>${legBtn}</td><td>${sb}</td><td>${btn}</td></tr>`; 
      } 
      document.getElementById('accounts-table').innerHTML=ach||'<tr><td colspan="5" style="text-align:center;">No accounts.</td></tr>'; 
    }); 
  }
  
  function openDisciplineModal(id, name, score) { currentDiscStudentId = id; document.getElementById('disc-cadet-id').innerText = id; document.getElementById('disc-cadet-name').innerText = name; document.getElementById('disc-cadet-score').innerText = score; let sColor = score < 75 ? 'var(--status-red)' : (score < 90 ? 'var(--status-yellow)' : 'var(--status-green)'); document.getElementById('disc-cadet-score').style.color = sColor; document.getElementById('disc-action-select').value = ""; loadDisciplineHistory(id); const modal = document.getElementById('discipline-modal'); modal.style.display = 'flex'; setTimeout(() => modal.classList.add('show'), 10); }
  function closeDisciplineModal(force) { const modal = document.getElementById('discipline-modal'); if (force === true || force.target === modal) { modal.classList.remove('show'); setTimeout(() => modal.style.display = 'none', 300); } }
  
  function loadDisciplineHistory(id) { 
    document.getElementById('disc-history-table').innerHTML = '<tr><td colspan="4" style="text-align:center; padding:10px 0;"><i class="fas fa-spinner fa-spin"></i> Loading...</td></tr>'; 
    apiCall('getDiscipline', { studentId: id, user: session.user, pass: session.pass }, (res) => { 
        let h = ''; 
        res.records.forEach(r => { 
            let ptsColor = parseInt(r.points) > 0 ? 'var(--status-green)' : 'var(--status-red)'; 
            let typeBadge = r.type === 'Merit' ? '<span class="badge badge-present">MERIT</span>' : '<span class="badge badge-absent">DEMERIT</span>'; 
            h += `<tr style="border-bottom: 1px solid var(--border);"> <td style="padding:8px 0;">${r.date}</td> <td style="padding:8px 0;">${typeBadge}</td> <td style="padding:8px 0; color:var(--text-muted);">${escapeHTML(r.reason)} <br><small>by ${escapeHTML(r.admin)}</small></td> <td style="padding:8px 0; font-weight:bold; color:${ptsColor};">${r.points > 0 ? '+'+r.points : r.points}</td> </tr>`; 
        }); 
        document.getElementById('disc-history-table').innerHTML = h || '<tr><td colspan="4" style="text-align:center; padding:10px 0;">No records found.</td></tr>'; 
    }); 
  }
  
  function submitDiscipline() { 
    const val = document.getElementById('disc-action-select').value; 
    if (!val) return Swal.fire('Notice', 'Please select an action from the dropdown.', 'warning'); 
    
    const btn = document.getElementById('btn-submit-discipline');
    btn.disabled = true;
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> RECORDING...';
    btn.style.opacity = '0.7';
    btn.style.cursor = 'not-allowed';

    const parts = val.split('|'); const type = parts[0]; const points = parseInt(parts[1]); const reason = parts[2]; 
    Swal.fire({ title: 'RECORDING...', didOpen: () => Swal.showLoading() }); 
    
    apiCall('addDiscipline', { studentId: currentDiscStudentId, type: type, points: points, reason: reason, user: session.user, pass: session.pass }, (res) => { 
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-gavel"></i> RECORD ACTION';
        btn.style.opacity = '1';
        btn.style.cursor = 'pointer';

        Swal.fire('Success', 'Discipline action recorded.', 'success'); 
        document.getElementById('disc-action-select').value = ""; 
        
        loadDashboardData(); 
        loadDisciplineHistory(currentDiscStudentId); 
        let currScore = parseInt(document.getElementById('disc-cadet-score').innerText); 
        document.getElementById('disc-cadet-score').innerText = currScore + points; 
    }); 
  }

  function renderDonut(p,l,a) { const ctx=document.getElementById('chart-donut').getContext('2d'); if(donutChart) donutChart.destroy(); donutChart = new Chart(ctx, { type: 'doughnut', data: { labels: ['Present','Late','Absent'], datasets: [{ data: [p,l,a], backgroundColor: ['#388e3c','#f57f17','#d32f2f'], borderWidth: 0 }] }, options: { responsive: true, maintainAspectRatio: false, cutout: '70%', plugins: { legend: { position: 'bottom', labels: { color: isDarkMode?'#e0e0e0':'#2c3539', font: { family: 'Inter', size: 13, weight: '600' } } } } } }); }

  function createAcc() { const u=document.getElementById('new-user').value.trim(), p=document.getElementById('new-pass').value, r=document.getElementById('new-role').value; if(!u||!p) return Swal.fire('Notice', 'Fill fields.', 'warning'); Swal.fire({ title: 'CREATING...', didOpen: () => Swal.showLoading() }); apiCall('createAccount', { newUser: u, newPass: p, role: r, user: session.user, pass: session.pass }, (res) => { Swal.fire('Success', res.message, 'success'); document.getElementById('new-user').value=''; document.getElementById('new-pass').value=''; loadDashboardData(); }); }
  function changeAccStatus(u, s) { Swal.fire({ title: `Change ${u} to ${s}?`, showCancelButton: true }).then(r => { if(r.isConfirmed) apiCall('updateAccountStatus', { targetUser: u, newStatus: s, user: session.user, pass: session.pass }, () => loadDashboardData()); }); }
  
  window.toggleLegacyAccess = function(userTarget, currentStatus) {
      const btnId = 'toggle-btn-' + userTarget;
      const btn = document.getElementById(btnId);
      
      let newStatus = currentStatus === 'Granted' ? 'Denied' : 'Granted';
      
      if (btn) {
          if(newStatus === 'Granted') {
              btn.outerHTML = `<button id="${btnId}" style="padding:4px 8px; font-size:11px; background:transparent; border:1px solid var(--status-green); color:var(--status-green); border-radius:4px; font-weight:bold; cursor:pointer;" onclick="toggleLegacyAccess('${userTarget}', 'Granted')">ACCESS: ON</button>`;
          } else {
              btn.outerHTML = `<button id="${btnId}" style="padding:4px 8px; font-size:11px; background:transparent; border:1px solid var(--status-red); color:var(--status-red); border-radius:4px; font-weight:bold; cursor:pointer;" onclick="toggleLegacyAccess('${userTarget}', 'Denied')">ACCESS: OFF</button>`;
          }
      }

      Swal.fire({ toast: true, position: 'top-end', icon: 'info', title: 'Updating clearance...', showConfirmButton: false, timer: 1500 });

      apiCall('toggleLegacyAccess', { targetUser: userTarget, user: session.user, pass: session.pass }, (res) => {
          Swal.fire({ toast: true, position: 'top-end', icon: 'success', title: 'Clearance Updated!', showConfirmButton: false, timer: 2000 });
      }, (err) => {
          loadDashboardData(); 
      });
  }

  function editStudent(id, coy, con) { Swal.fire({ title: 'UPDATE DOSSIER', html: `<div style="text-align:left;"><label>Company</label><input id="swal-company" class="swal2-input" value="${escapeHTML(coy)}"></div><div style="text-align:left;"><label>Contact</label><input id="swal-contact" class="swal2-input" value="${escapeHTML(con)}"></div>`, showCancelButton: true, confirmButtonText: 'SAVE', preConfirm: () => [ document.getElementById('swal-company').value, document.getElementById('swal-contact').value ] }).then(r => { if(r.isConfirmed) { Swal.fire({ title: 'UPDATING...', didOpen: () => Swal.showLoading() }); apiCall('updateStudentInfo', { id: id, company: r.value[0], contact: r.value[1], user: session.user, pass: session.pass }, () => { Swal.fire('Saved!', 'Dossier updated.', 'success'); loadDashboardData(); }); } }); }
  function deleteStudentPrompt(id) { Swal.fire({ title: 'CONFIRM DISCHARGE?', text: 'Type DELETE', input: 'text', showCancelButton: true, confirmButtonColor: 'var(--status-red)', confirmButtonText: 'DISCHARGE', inputValidator: v => v!=='DELETE'?'Type DELETE':null }).then(r => { if(r.isConfirmed) { Swal.fire({ title: 'REMOVING...', didOpen: () => Swal.showLoading() }); apiCall('deleteStudentData', { id: id, user: session.user, pass: session.pass }, () => { Swal.fire('Removed!', 'Cadet discharged.', 'success'); loadDashboardData(); }); } }); }
  function loadLeavesData() { document.getElementById('leaves-table').innerHTML='<tr><td colspan="6" style="text-align:center;">Loading...</td></tr>'; apiCall('getLeaveRequests', { user: session.user, pass: session.pass }, (res) => { let p=0, a=0, r=0, h=''; res.leaves.forEach(lv => { if(lv.status==='Pending') p++; else if(lv.status==='Approved') a++; else if(lv.status==='Rejected') r++; let ab='-'; if(lv.status==='Pending'&&session.role==='Super Admin') ab=`<button class="btn-success" style="padding:6px 10px; font-size:11px;" onclick="updateLeave('${lv.id}','Approved')">APPROVE</button> <button class="btn-danger" style="padding:6px 10px; font-size:11px;" onclick="updateLeave('${lv.id}','Rejected')">DENY</button>`; let bc=lv.status==='Approved'?'badge-approved':(lv.status==='Rejected'?'badge-rejected':'badge-pending'); h+=`<tr><td>${lv.from?new Date(lv.from).toLocaleDateString():''} – ${lv.to?new Date(lv.to).toLocaleDateString():''}</td><td><b>${lv.studentId}</b></td><td>${escapeHTML(lv.name)}</td><td>${escapeHTML(lv.reason)}</td><td><span class="badge ${bc}">${lv.status}</span></td><td>${ab}</td></tr>`; }); document.getElementById('leaves-table').innerHTML=h||'<tr><td colspan="6" style="text-align:center;">No requests.</td></tr>'; document.getElementById('lv-stat-pending').innerText=p; document.getElementById('lv-stat-approved').innerText=a; document.getElementById('lv-stat-rejected').innerText=r; }); }
  function submitLeave() { const id=document.getElementById('lv-id').value.trim(), f=document.getElementById('lv-from').value, t=document.getElementById('lv-to').value, x=document.getElementById('lv-reason').value.trim(); if(!id||!f||!t||!x) return Swal.fire('Notice', 'Fill fields.', 'warning'); Swal.fire({ title: 'TRANSMITTING...', didOpen: () => Swal.showLoading() }); apiCall('submitLeaveRequest', { studentId: id, fromDate: f, toDate: t, reason: x, user: session.user, pass: session.pass }, (res) => { Swal.fire('Success', res.message, 'success'); ['id','from','to','reason'].forEach(k => document.getElementById(`lv-${k}`).value=''); loadLeavesData(); }); }
  
  function updateLeave(id, s) { 
      Swal.fire({ title: `Set status to ${s}?`, showCancelButton: true }).then(r => { 
          if(r.isConfirmed) { 
              if(session.role === 'Super Admin') {
                  let bl = document.getElementById('badge-leaves');
                  if(bl && bl.style.display !== 'none') {
                      let count = parseInt(bl.innerText || 0) - 1;
                      bl.innerText = count;
                      if(count <= 0) bl.style.display = 'none';
                  }
              }
              Swal.fire({ toast: true, position: 'top-end', icon: 'info', title: 'Processing...', showConfirmButton: false, timer: 1500 });
              apiCall('updateLeaveStatus', { leaveId: id, status: s, user: session.user, pass: session.pass }, () => loadLeavesData());

  function fetchStudentsForDropdown() { document.getElementById('id-target-select').innerHTML='<option value="ALL">Fetching data...</option>'; document.getElementById('lv-id').innerHTML='<option value="">Fetching data...</option>'; apiCall('getStudentsForIDCards', { user: session.user, pass: session.pass }, (res) => { globalStudentCache = res.students; let o='<option value="ALL">Entire Roster (Bulk)</option>', lo='<option value="">Select Cadet...</option>'; res.students.forEach(s => { o+=`<option value="${s.id}">${s.id} – ${s.name}</option>`; lo+=`<option value="${s.id}">${s.id} – ${s.name}</option>`; }); document.getElementById('id-target-select').innerHTML=o; document.getElementById('lv-id').innerHTML=lo; }); }
