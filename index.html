<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SCCK ROTC Unit - Official Site</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root { --army-dark: #0a0c08; --army-primary: #1e2418; --army-gold: #d4af37; --card-bg: #12140e; --text-main: #ffffff; --text-muted: #b0bec5; --border-color: #2a3322; }
    body.light-mode { --army-dark: #1b2015; --army-primary: #4b5a36; --army-gold: #d4af37; --card-bg: #ffffff; --text-main: #ffffff; --text-muted: #dce0d5; --border-color: #d4d8cc; }
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
    h1, h2, h3, button, .nav-links a { font-family: 'Oswald', sans-serif; text-transform: uppercase; letter-spacing: 1px; }
    body { background: var(--army-dark); color: var(--text-main); overflow-x: hidden; scroll-behavior: smooth; transition: background 0.5s ease, color 0.5s ease; }
    body.light-mode { background: radial-gradient(circle at center, var(--army-primary) 0%, var(--army-dark) 100%); background-attachment: fixed; }

    #gate-screen { position: fixed; inset: 0; z-index: 50000; background: var(--army-dark); display: flex; align-items: center; justify-content: center; transition: opacity 0.8s ease, transform 1s cubic-bezier(0.16, 1, 0.3, 1); }
    #gate-screen.unlocked { opacity: 0; transform: scale(1.1); pointer-events: none; }
    .gate-card { background: var(--card-bg); padding: 50px 40px; border-radius: 12px; border: 1px solid rgba(212, 175, 55, 0.4); box-shadow: 0 0 50px rgba(212, 175, 55, 0.05), 0 20px 60px rgba(0,0,0,0.8); text-align: center; max-width: 500px; width: 90%; transition: all 0.5s ease; position: relative; overflow: hidden; }
    body.light-mode #gate-screen { background: transparent; }
    body.light-mode .gate-card { background: var(--card-bg); border: none; border-top: 5px solid var(--army-gold); box-shadow: 0 20px 50px rgba(0,0,0,0.6); backdrop-filter: none; }
    body.light-mode .gate-glow { display: none; }
    body.light-mode .gate-title { color: #2d3821; text-shadow: none; }
    body.light-mode .gate-motto { color: #6b705c; font-weight: 600; }
    .gate-glow { position: absolute; top: -50%; left: 50%; transform: translateX(-50%); width: 250px; height: 250px; background: radial-gradient(circle, rgba(212,175,55,0.2) 0%, transparent 70%); z-index: 0; }
    .gate-content { position: relative; z-index: 1; }
    .gate-logo { width: 120px; height: 120px; object-fit: contain; margin-bottom: 20px; filter: drop-shadow(0 0 20px rgba(212, 175, 55, 0.5)); animation: float 6s ease-in-out infinite; display: inline-block; transition: opacity 0.5s ease;}
    @keyframes float { 0% { transform: translateY(0px); } 50% { transform: translateY(-8px); } 100% { transform: translateY(0px); } }
    .gate-title { font-size: 38px; color: var(--army-gold); margin-bottom: 15px; letter-spacing: 2px; text-shadow: 0 4px 10px rgba(0,0,0,0.5); line-height: 1.1; }
    .gate-motto { font-size: 13px; color: var(--text-muted); margin-bottom: 35px; font-weight: 500; letter-spacing: 3px; font-family: 'Oswald', sans-serif;}
    .btn-enter { background: var(--army-gold); color: #1b2015; font-size: 16px; font-weight: bold; padding: 16px 35px; border-radius: 6px; border: none; cursor: pointer; transition: all 0.3s; text-transform: uppercase; box-shadow: 0 4px 15px rgba(212, 175, 55, 0.3); width: 100%; display: flex; justify-content: center; align-items: center; gap: 10px;}
    .btn-enter:hover { background: #ebd575; transform: translateY(-3px); box-shadow: 0 8px 25px rgba(212, 175, 55, 0.5); }

    #main-wrapper { opacity: 0; transform: translateY(40px); transition: all 1s cubic-bezier(0.16, 1, 0.3, 1) 0.3s; height: 100vh; overflow: hidden; display: none; }
    #main-wrapper.unlocked { display: block; opacity: 1; transform: translateY(0); height: auto; overflow: visible; }

    .header { position: fixed; top: 0; left: 0; width: 100%; padding: 12px 40px; display: flex; justify-content: space-between; align-items: center; z-index: 30000; background: rgba(10, 12, 8, 0.95); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border-color); transform: translateY(-100%); transition: transform 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.5s, background 0.3s, border 0.3s; }
    .header.unlocked { transform: translateY(0); }
    body.light-mode .header { background: rgba(27, 32, 21, 0.95); border-bottom: 1px solid rgba(255, 255, 255, 0.1); }
    .header .logo-group { display: flex; align-items: center; gap: 15px; text-decoration: none; }
    .header .logo-group img { width: 50px; height: 50px; object-fit: contain; transition: opacity 0.5s ease; }
    .logo-text { display: flex; flex-direction: column; justify-content: center; }
    .logo-text .line1 { font-family: 'Inter', sans-serif; font-size: 16px; font-weight: 800; color: var(--text-main); letter-spacing: 0.5px; }
    .logo-text .line2 { font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 500; color: var(--text-muted); letter-spacing: 0.5px; margin-top: -2px; }
    .nav-links { display: flex; gap: 30px; align-items: center; }
    .nav-links a, .theme-btn { color: var(--text-main); text-decoration: none; font-size: 14px; font-weight: 500; transition: color 0.3s; position: relative; font-family: 'Inter', sans-serif; background: transparent; border: none; cursor: pointer; }
    .nav-links a:hover, .theme-btn:hover { color: var(--army-gold); }
    .nav-btn { background: var(--army-gold) !important; color: #1b2015 !important; padding: 8px 20px; border-radius: 4px; font-weight: 700; transition: all 0.3s !important; border: 1px solid transparent !important; font-family: 'Oswald', sans-serif !important;}
    .nav-btn:hover { background: transparent !important; color: var(--army-gold) !important; border: 1px solid var(--army-gold) !important; }

    .landing-showcase { position: relative; z-index: 1; padding: 120px 20px 60px 20px; min-height: 60vh; border-bottom: 1px solid var(--border-color); }
    .section-title { color: var(--army-gold); font-size: 32px; margin-bottom: 40px; text-align: center; border-bottom: 2px solid rgba(212, 175, 55, 0.3); padding-bottom: 15px; max-width: 900px; margin-left: auto; margin-right: auto;}
    .post-grid { max-width: 1100px; margin: 0 auto; display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 30px; justify-content: center; }
    .post-card { background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 12px; overflow: hidden; display: flex; flex-direction: column; transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1), box-shadow 0.4s ease; box-shadow: 0 8px 25px rgba(0,0,0,0.3); }
    .post-card:hover { transform: translateY(-8px); border-color: var(--army-gold); box-shadow: 0 15px 35px rgba(212, 175, 55, 0.15); }
    
    body.light-mode .post-card, body.light-mode .officer-card, body.light-mode .modal-content, body.light-mode .dossier-content { background: var(--card-bg); box-shadow: 0 8px 20px rgba(0,0,0,0.2); border: none; }
    body.light-mode .post-title, body.light-mode .officer-name, body.light-mode .full-post-title, body.light-mode .dossier-name { color: #1b2015; }
    body.light-mode .post-desc, body.light-mode .officer-desig, body.light-mode .full-post-desc, body.light-mode .dossier-meta, body.light-mode .dossier-bio, body.light-mode .dossier-back-btn, body.light-mode .hof-name, body.light-mode .hof-cc-name { color: #1b2015; }
    body.light-mode .hof-name, body.light-mode .hof-cc-name { text-shadow: 0 2px 5px rgba(0,0,0,0.2); }
    body.light-mode .read-more-btn { color: #4b5a36; border-color: #4b5a36; }
    body.light-mode .read-more-btn:hover { background: #4b5a36; color: #ffffff; }
    body.light-mode .class-name { text-shadow: 0 2px 5px rgba(0,0,0,0.5); }

    .post-img-container { overflow: hidden; height: 220px; border-bottom: 2px solid var(--army-gold); position: relative; }
    .post-img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.6s ease; }
    .post-card:hover .post-img { transform: scale(1.08); }
    .post-content { padding: 25px; display: flex; flex-direction: column; flex: 1; }
    body:not(.light-mode) .post-content { background: linear-gradient(to bottom, transparent, rgba(10, 12, 8, 0.4)); }
    .post-date { font-family: 'Inter', sans-serif; font-size: 12px; color: var(--army-gold); font-weight: 800; margin-bottom: 10px; letter-spacing: 1.5px; }
    .post-title { font-size: 22px; color: var(--text-main); margin-bottom: 15px; line-height: 1.3; font-weight: 700; }
    .post-desc { font-family: 'Inter', sans-serif; font-size: 14px; color: var(--text-muted); line-height: 1.6; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; margin-bottom: 20px; flex: 1; }
    .read-more-btn { background: transparent; color: var(--army-gold); border: 1px solid var(--army-gold); padding: 10px 15px; border-radius: 4px; font-size: 13px; font-family: 'Oswald', sans-serif; cursor: pointer; transition: 0.3s; text-transform: uppercase; font-weight: bold; width: 100%; }
    .read-more-btn:hover { background: var(--army-gold); color: #1b2015; }

    /* ========================================================================= */
    /* HALL OF FAME: FLOATING LAYOUT (NO CARDS)                                  */
    /* ========================================================================= */
    .hof-section { padding: 60px 20px; position: relative; z-index: 1; border-bottom: 1px solid var(--border-color); }
    .hof-era-block { max-width: 1000px; margin: 0 auto 60px auto; text-align: center; }
    
    /* Commandant Floating Element */
    .hof-floating-container { display: flex; flex-direction: column; align-items: center; cursor: pointer; transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1); margin-bottom: 30px; padding: 20px; }
    .hof-floating-container:hover { transform: translateY(-10px) scale(1.05); }
    .hof-portrait { width: 180px; height: 180px; border-radius: 50%; object-fit: cover; margin-bottom: 15px; border: 3px solid var(--army-gold); box-shadow: 0 15px 35px rgba(0,0,0,0.5); background: #000; transition: box-shadow 0.4s ease; }
    .hof-floating-container:hover .hof-portrait { box-shadow: 0 20px 45px rgba(212, 175, 55, 0.4); }
    .hof-role { font-size: 14px; color: var(--army-gold); font-weight: bold; letter-spacing: 2px; margin-bottom: 5px; text-transform: uppercase; }
    .hof-name { font-size: 34px; color: var(--text-main); font-family: 'Oswald', sans-serif; text-transform: uppercase; text-shadow: 0 4px 10px rgba(0,0,0,0.8); line-height: 1.1; }
    
    /* Corps Commander Floating Elements */
    .hof-cc-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 30px; margin-top: 20px; }
    .hof-cc-container { display: flex; flex-direction: column; align-items: center; cursor: pointer; transition: transform 0.3s; padding: 15px; }
    .hof-cc-container:hover { transform: translateY(-8px) scale(1.03); }
    .hof-cc-portrait { width: 130px; height: 130px; border-radius: 50%; object-fit: cover; margin-bottom: 12px; border: 2px solid var(--army-gold); box-shadow: 0 10px 25px rgba(0,0,0,0.5); background: #000; transition: box-shadow 0.3s ease; }
    .hof-cc-container:hover .hof-cc-portrait { box-shadow: 0 15px 30px rgba(212, 175, 55, 0.3); }
    .hof-cc-role { font-size: 12px; color: var(--army-gold); font-weight: bold; letter-spacing: 2px; margin-bottom: 5px; text-transform: uppercase; }
    .hof-cc-name { font-size: 22px; color: var(--text-main); font-family: 'Oswald', sans-serif; text-transform: uppercase; text-shadow: 0 4px 10px rgba(0,0,0,0.8); line-height: 1.1; text-align: center; }

    .hof-divider { text-align: center; margin: 60px 0 40px 0; position: relative; }
    .hof-divider::before { content: ""; position: absolute; top: 50%; left: 0; right: 0; border-top: 2px dashed var(--border-color); z-index: 1; }
    .hof-divider span { background: var(--army-dark); padding: 0 20px; position: relative; z-index: 2; color: var(--text-muted); font-family: 'Oswald', sans-serif; font-size: 18px; letter-spacing: 2px; transition: background 0.5s; }
    body.light-mode .hof-divider span { background: #fdfdfd; }

    /* ========================================================================= */
    /* HALL OF FAME: CINEMATIC MODAL (PEAKY BLINDERS STYLE)                      */
    /* ========================================================================= */
    .cinematic-overlay { position: fixed; inset: 0; background: rgba(10, 12, 8, 0.95); z-index: 60000; display: none; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.5s ease; backdrop-filter: blur(10px); }
    .cinematic-overlay.show { display: flex; opacity: 1; }
    /* This modal forces a dark theme regardless of Light Mode to keep the cinematic effect */
    .cinematic-content { width: 100vw; height: 100vh; background: #0a0c08; position: relative; overflow: hidden; display: flex; transform: scale(1.05); transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1); }
    .cinematic-overlay.show .cinematic-content { transform: scale(1); }
    
    .cinematic-bg-split { position: absolute; top: 0; right: 0; bottom: 0; width: 55%; background: #12140e; clip-path: polygon(15% 0, 100% 0, 100% 100%, 0 100%); z-index: 1; border-left: 2px solid rgba(212, 175, 55, 0.2); }
    
    .cinematic-close { position: absolute; top: 30px; right: 40px; font-size: 30px; color: var(--army-gold); cursor: pointer; z-index: 10; transition: 0.3s; }
    .cinematic-close:hover { transform: rotate(90deg) scale(1.2); color: #fff; }
    
    .cinematic-left { flex: 1.2; padding: 100px 80px; z-index: 2; display: flex; flex-direction: column; justify-content: center; }
    .cinematic-rank { color: var(--army-gold); font-family: 'Inter', sans-serif; font-size: 16px; font-weight: bold; letter-spacing: 4px; margin-bottom: 10px; text-transform: uppercase; }
    .cinematic-name { color: #ffffff; font-family: 'Oswald', sans-serif; font-size: 80px; line-height: 1; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 30px; text-shadow: 0 10px 30px rgba(0,0,0,0.5); }
    .cinematic-quote { font-family: 'Inter', sans-serif; font-size: 18px; color: #dce0d5; font-style: italic; border-left: 4px solid var(--army-gold); padding-left: 20px; line-height: 1.6; margin-bottom: 30px; max-width: 600px; }
    .cinematic-bio { font-family: 'Inter', sans-serif; font-size: 15px; color: #b0bec5; line-height: 1.8; max-width: 600px; max-height: 30vh; overflow-y: auto; padding-right: 15px; }
    
    .cinematic-right { flex: 0.8; position: relative; z-index: 2; display: flex; align-items: flex-end; justify-content: center; }
    .cinematic-hero-img { width: 100%; height: 100%; object-fit: cover; object-position: top center; mask-image: linear-gradient(to top, rgba(0,0,0,1) 70%, rgba(0,0,0,0) 100%); -webkit-mask-image: linear-gradient(to bottom, rgba(0,0,0,1) 70%, rgba(0,0,0,0) 100%); mix-blend-mode: luminosity; opacity: 0.8; transition: 0.5s ease; }
    .cinematic-content:hover .cinematic-hero-img { mix-blend-mode: normal; opacity: 1; }

    .cinematic-bio::-webkit-scrollbar { width: 4px; }
    .cinematic-bio::-webkit-scrollbar-thumb { background: var(--army-gold); }

    @media (max-width: 900px) {
        .cinematic-content { flex-direction: column; overflow-y: auto; }
        .cinematic-bg-split { width: 100%; height: 60%; top: auto; bottom: 0; clip-path: polygon(0 15%, 100% 0, 100% 100%, 0 100%); border-left: none; border-top: 2px solid rgba(212, 175, 55, 0.2); }
        .cinematic-left { padding: 60px 20px; text-align: center; justify-content: flex-start; z-index: 3; }
        .cinematic-name { font-size: 50px; }
        .cinematic-quote { border-left: none; border-bottom: 2px solid var(--army-gold); padding-left: 0; padding-bottom: 20px; margin: 0 auto 30px auto; }
        .cinematic-bio { margin: 0 auto; max-height: none; }
        .cinematic-right { height: 50vh; width: 100%; position: absolute; bottom: 0; z-index: 1; opacity: 0.3; pointer-events: none; }
        .cinematic-close { top: 15px; right: 20px; }
    }


    /* ========================================================================= */
    /* LEGACY CLASSES & MISC CSS                                                 */
    /* ========================================================================= */
    .landing-legacy { position: relative; z-index: 1; padding: 60px 20px; border-bottom: 1px solid var(--border-color); }
    .legacy-grid { max-width: 1000px; margin: 0 auto; display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 40px; }
    .class-card { background: transparent; border: none; padding: 20px; text-align: center; cursor: pointer; transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1); display: flex; flex-direction: column; align-items: center; }
    .class-card:hover { transform: translateY(-15px) scale(1.05); }
    .class-logo { width: 160px; height: 160px; object-fit: contain; margin-bottom: 20px; filter: drop-shadow(0 10px 15px rgba(0,0,0,0.8)); transition: transform 0.4s ease, filter 0.4s ease; }
    body.light-mode .class-logo { filter: drop-shadow(0 10px 15px rgba(0,0,0,0.25)); }
    .class-card:hover .class-logo { transform: scale(1.1); filter: drop-shadow(0 15px 25px rgba(212, 175, 55, 0.6)); }
    .class-year { font-size: 14px; color: var(--army-gold); font-weight: bold; margin-bottom: 5px; letter-spacing: 2px; }
    .class-name { font-size: 26px; color: var(--text-main); text-shadow: 0 4px 10px rgba(0,0,0,0.5); }
    .officer-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 25px; margin-top:20px; }
    .officer-card { text-align: center; background: var(--card-bg); padding: 20px; border-radius: 8px; border: 1px solid var(--border-color); transition: transform 0.3s; cursor: pointer; }
    .officer-card:hover { transform: translateY(-5px); border-color: var(--army-gold); box-shadow: 0 10px 25px rgba(212,175,55,0.2); }
    .officer-photo { width: 120px; height: 120px; border-radius: 50%; object-fit: cover; border: 3px solid var(--army-gold); margin: 0 auto 15px auto; background: #000; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
    .officer-rank { font-size: 12px; color: var(--army-gold); font-weight: bold; letter-spacing: 1px; margin-bottom: 5px; }
    .officer-name { font-size: 16px; color: var(--text-main); font-weight: bold; margin-bottom: 5px; font-family: 'Oswald', sans-serif;}
    .officer-desig { font-size: 12px; color: var(--text-muted); }

    .carousel-container { position: relative; width: 100%; max-height: 450px; background: #000; border-radius: 8px; margin-bottom: 25px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
    .carousel-slide { display: none; width: 100%; height: 100%; text-align: center; }
    .carousel-slide.active { display: block; animation: fade 0.5s ease-in-out; }
    @keyframes fade { from { opacity: 0.4; } to { opacity: 1; } }
    .carousel-slide img { max-width: 100%; max-height: 450px; object-fit: contain; }
    .carousel-btn { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(0,0,0,0.7); color: white; border: none; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; font-size: 18px; transition: 0.3s; z-index: 10; display: flex; align-items: center; justify-content: center; }
    .carousel-btn:hover { background: var(--army-gold); color: black; }
    .carousel-prev { left: 15px; }
    .carousel-next { right: 15px; }
    .carousel-dots { position: absolute; bottom: 15px; width: 100%; text-align: center; z-index: 10; }
    .dot { display: inline-block; width: 8px; height: 8px; background: rgba(255,255,255,0.4); border-radius: 50%; margin: 0 5px; cursor: pointer; transition: 0.3s; }
    .dot.active { background: var(--army-gold); transform: scale(1.3); }
    
    .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); backdrop-filter: blur(8px); z-index: 40000; display: none; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.3s ease; }
    .modal-overlay.show { display: flex; opacity: 1; }
    .modal-content { background: var(--card-bg); width: 90%; max-width: 800px; max-height: 85vh; overflow-y: auto; border-radius: 12px; padding: 40px; border: 2px solid var(--army-gold); position: relative; transform: scale(0.95) translateY(20px); transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1); box-shadow: 0 20px 60px rgba(0,0,0,0.7); color: var(--text-main); }
    .modal-overlay.show .modal-content { transform: scale(1) translateY(0); }
    .close-btn { position: absolute; top: 20px; right: 25px; font-size: 28px; color: var(--text-muted); cursor: pointer; transition: 0.2s; z-index: 10;}
    .close-btn:hover { color: #ef5350; transform: rotate(90deg); }
    
    .full-post-date { font-family: 'Inter', sans-serif; font-size: 13px; color: var(--army-gold); font-weight: bold; margin-bottom: 5px; }
    .full-post-title { font-size: 32px; color: var(--text-main); margin-bottom: 20px; line-height: 1.2; border-bottom: 1px solid var(--border-color); padding-bottom: 15px;}
    .full-post-desc { font-family: 'Inter', sans-serif; font-size: 16px; color: var(--text-muted); line-height: 1.8; white-space: pre-wrap; }
    
    .dossier-layout { display: flex; flex-direction: row; gap: 30px; margin-top: 15px; }
    .dossier-img-wrap { flex: 0.8; max-width: 350px; border: 4px solid var(--army-gold); border-radius: 8px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.5); background: #000; align-self: flex-start; }
    .dossier-img { width: 100%; display: block; object-fit: cover; }
    .dossier-info { flex: 1.2; text-align: left; display: flex; flex-direction: column; justify-content: center; }
    .dossier-rank { font-size: 18px; color: var(--army-gold); font-weight: bold; letter-spacing: 2px; margin-bottom: 5px; }
    .dossier-name { font-size: 40px; color: var(--text-main); line-height: 1.1; margin-bottom: 20px; border-bottom: 1px solid var(--border-color); padding-bottom: 15px; font-family: 'Oswald', sans-serif; text-transform: uppercase;}
    .dossier-meta { font-family: 'Inter', sans-serif; font-size: 15px; color: var(--text-muted); margin-bottom: 8px; display: flex; align-items: center; gap: 10px; }
    .dossier-meta i { color: var(--army-gold); width: 20px; text-align: center; }
    .dossier-bio { margin-top: 25px; font-size: 15px; line-height: 1.8; color: var(--text-muted); font-family: 'Inter', sans-serif; white-space: pre-wrap; }
    .dossier-back-btn { background: transparent; border: none; color: var(--text-muted); cursor: pointer; font-family: 'Oswald', sans-serif; margin-bottom: 15px; transition: 0.3s; font-size: 14px; text-transform: uppercase; font-weight: bold;}
    .dossier-back-btn:hover { color: var(--army-gold); }
    
    .pagination-wrap { display: flex; justify-content: center; align-items: center; gap: 20px; margin-top: 40px; width: 100%; }
    .page-btn { background: transparent; border: 1px solid var(--army-gold); color: var(--army-gold); padding: 10px 20px; border-radius: 4px; cursor: pointer; font-family: 'Oswald', sans-serif; font-size: 14px; text-transform: uppercase; font-weight: bold; transition: all 0.3s; }
    .page-btn:hover:not(:disabled) { background: var(--army-gold); color: #1b2015; transform: translateY(-2px); box-shadow: 0 4px 15px rgba(212,175,55,0.3); }
    .page-btn:disabled { border-color: var(--text-muted); color: var(--text-muted); cursor: not-allowed; opacity: 0.5; }
    .page-indicator { color: var(--text-main); font-family: 'Oswald', sans-serif; font-size: 16px; font-weight: bold; letter-spacing: 1px; }

    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: var(--army-dark); border-radius: 4px; }
    ::-webkit-scrollbar-thumb { background: var(--army-gold); border-radius: 4px; }
    
    @media (max-width: 768px) { 
      .header { padding: 15px 20px; } 
      .nav-links a.hide-mobile { display: none; } 
      .gate-title { font-size: 28px; } 
      .gate-card { padding: 35px 25px; } 
      .modal-content { padding: 25px 20px; } 
      .post-grid { grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); } 
      .dossier-layout { flex-direction: column; }
      .dossier-img-wrap { max-width: 100%; margin: 0 auto 20px auto; }
      .dossier-name { font-size: 32px; }
    }
  </style>
</head>
<body>

  <div id="gate-screen">
    <div class="gate-card">
      <div class="gate-glow"></div>
      <div class="gate-content">
        <img src="https://cdn-icons-png.flaticon.com/512/1055/1055664.png" id="gate-logo" class="gate-logo" alt="SCCK Logo">
        <h1 class="gate-title">SCCK ROTC UNIT</h1>
        <h3 class="gate-motto">LEADERSHIP • DISCIPLINE • EXCELLENCE</h3>
        <button onclick="enterSite()" class="btn-enter"><i class="fas fa-shield-alt"></i> WELCOME TO SCCK COMMAND</button>
      </div>
    </div>
  </div>

  <div id="main-wrapper">
    <header class="header" id="navbar">
      <a href="#" class="logo-group">
        <img src="https://cdn-icons-png.flaticon.com/512/1055/1055664.png" id="nav-logo" alt="Logo">
        <div class="logo-text"><span class="line1">ST. CLARE COLLEGE OF KALOOKAN</span><span class="line2">ROTC UNIT</span></div>
      </a>
      <nav class="nav-links">
        <button onclick="toggleTheme()" class="theme-btn" title="Toggle Light/Dark Mode"><i class="fas fa-sun" id="theme-icon" style="font-size: 18px;"></i></button>
        <a href="#showcase-section" class="hide-mobile">Activities</a>
        <a href="#hall-of-fame-section" class="hide-mobile">Command</a>
        <a href="#legacy-section" class="hide-mobile">Legacy</a>
        <a href="app.html" class="nav-btn"><i class="fas fa-lock"></i> Portal</a>
      </nav>
    </header>

    <div class="landing-showcase" id="showcase-section">
      <h2 class="section-title">CAPABILITIES & ACTIVITIES</h2>
      <div id="post-grid-container"><p style="text-align:center; width:100%; color:var(--text-muted);"><i class="fas fa-spinner fa-spin"></i> Retrieving intelligence reports...</p></div>
    </div>

    <!-- COMMAND ERA: HALL OF FAME (FLOATING LAYOUT) -->
    <section class="hof-section" id="hall-of-fame-section">
      <h2 class="section-title"><i class="fas fa-star"></i> HALL OF FAME: COMMAND ERA</h2>
      <div id="hof-container">
        <p style="text-align: center; color: var(--text-muted);"><i class="fas fa-spinner fa-spin"></i> Retrieving Unit Archives...</p>
      </div>
    </section>

    <div class="landing-legacy" id="legacy-section">
      <h2 class="section-title">CLASS LEGACY</h2>
      <div class="legacy-grid" id="legacy-grid-container"><p style="text-align:center; width:100%; color:var(--text-muted);"><i class="fas fa-spinner fa-spin"></i> Retrieving archives...</p></div>
    </div>
  </div>

  <!-- Shared Universal Modal (For Posts, Legacy Classes, and Corps Commanders) -->
  <div class="modal-overlay" id="public-modal" onclick="closeModal(event)">
    <div class="modal-content" id="modal-container-inner" onclick="event.stopPropagation()">
        <i class="fas fa-times close-btn" onclick="closeModal(true)"></i>
        <div id="modal-dynamic-content"></div>
    </div>
  </div>

  <!-- Cinematic Modal (Exclusively for Commandants) -->
  <div class="cinematic-overlay" id="cinematic-modal" onclick="closeCinematicDossier(event)">
    <div class="cinematic-content" onclick="event.stopPropagation()">
        <div class="cinematic-bg-split"></div>
        <i class="fas fa-times cinematic-close" onclick="closeCinematicDossier(true)"></i>
        
        <div class="cinematic-left">
            <div id="cine-rank" class="cinematic-rank"></div>
            <div id="cine-name" class="cinematic-name"></div>
            <div id="cine-quote" class="cinematic-quote"></div>
            <div id="cine-bio" class="cinematic-bio"></div>
        </div>
        
        <div class="cinematic-right" id="cine-img-container">
            <!-- Hero Image Injected Here -->
        </div>
    </div>
  </div>

  <script>
    // 🛑 MAKE SURE THIS MATCHES YOUR CURRENT DEPLOYMENT URL 🛑
    const GAS_API_URL = "https://script.google.com/macros/s/AKfycbyi-rYsOjTdvfzPYPmlbKh47tNqTA3drmBL2ThKRo2Y6Ss2EHqLPBZ7UZWxh4krLkdGOw/exec";

    let legacyCache = [];
    let postCache = [];
    let globalCommandData = [];
    
    let currentPostPage = 1;
    const POSTS_PER_PAGE = 6;

    // 🔥 URL CONVERTER (INCLUDES FACEBOOK BYPASS) 🔥
    function createEmbed(url) {
        if (!url) return '';
        let finalUrl = url;
        if (url.includes('youtube.com/watch?v=')) {
            finalUrl = url.replace('watch?v=', 'embed/').split('&')[0];
        } else if (url.includes('youtu.be/')) {
            finalUrl = url.replace('youtu.be/', 'youtube.com/embed/');
        } else if (url.includes('drive.google.com/file/d/')) {
            finalUrl = url.replace('/view', '/preview');
        } else if (url.includes('facebook.com') || url.includes('fb.watch')) {
            finalUrl = `https://www.facebook.com/plugins/video.php?href=${encodeURIComponent(url)}&show_text=false`;
        }
        return `<iframe src="${finalUrl}" style="width:100%; height:450px; border:none; border-radius:8px;" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen></iframe>`;
    }

    function formatHashtags(text) {
      if (!text) return "";
      return text.replace(/(#\w+)/g, '<span style="color:var(--army-gold); font-weight:800;">$1</span>');
    }

    function applyBranding(branding) {
      const gateLogo = document.getElementById('gate-logo');
      if(gateLogo && branding.logoUrl) gateLogo.src = branding.logoUrl;
      const navLogo = document.getElementById('nav-logo');
      if(navLogo && branding.navLogoUrl) navLogo.src = branding.navLogoUrl;
      const gateScreen = document.getElementById('gate-screen');
      if(gateScreen && branding.bgUrl) {
        if (!document.body.classList.contains('light-mode')) {
            gateScreen.style.backgroundImage = `linear-gradient(rgba(10, 12, 8, 0.7), rgba(10, 12, 8, 0.7)), url('${branding.bgUrl}')`;
            gateScreen.style.backgroundSize = 'cover';
            gateScreen.style.backgroundPosition = 'center';
        }
      }
    }

    const cachedBranding = JSON.parse(localStorage.getItem('scck_branding') || 'null');
    if (cachedBranding) applyBranding(cachedBranding);

    const cachedPosts = JSON.parse(localStorage.getItem('scck_posts') || 'null');
    if (cachedPosts) { postCache = cachedPosts; renderPostGrid(); }

    const cachedLegacy = JSON.parse(localStorage.getItem('scck_legacy') || 'null');
    if (cachedLegacy) { legacyCache = cachedLegacy; renderLegacyGrid(cachedLegacy); }


    function toggleTheme() {
      const isLight = document.body.classList.toggle('light-mode');
      const icon = document.getElementById('theme-icon');
      icon.className = isLight ? 'fas fa-moon' : 'fas fa-sun';
      localStorage.setItem('scck_theme', isLight ? 'light' : 'dark');
      if (cachedBranding) applyBranding(cachedBranding);
    }

    if (localStorage.getItem('scck_theme') === 'light') {
      document.body.classList.add('light-mode');
      document.getElementById('theme-icon').className = 'fas fa-moon';
    }

    function enterSite() {
      document.getElementById('gate-screen').classList.add('unlocked');
      setTimeout(() => { document.getElementById('gate-screen').style.display = 'none'; }, 800);
      document.getElementById('main-wrapper').classList.add('unlocked');
      document.getElementById('navbar').classList.add('unlocked');
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function apiCall(action, payload, onSuccess, onFailure) {
      payload.action = action;
      fetch(GAS_API_URL, { method: 'POST', headers: { 'Content-Type': 'text/plain;charset=utf-8' }, body: JSON.stringify(payload) })
      .then(response => response.json())
      .then(data => { if (data.error && !data.success && data.message) throw new Error(data.message); onSuccess(data); })
      .catch(error => { console.error("API Error:", error); if (onFailure) onFailure(error); });
    }

    window.onload = () => {
      apiCall('getLegacyData', {}, (data) => {
        if (data.branding) {
          localStorage.setItem('scck_branding', JSON.stringify(data.branding));
          applyBranding(data.branding);
        }
        if (data.classes && data.classes.length > 0) { 
          localStorage.setItem('scck_legacy', JSON.stringify(data.classes)); 
          legacyCache = data.classes; 
          renderLegacyGrid(data.classes); 
        }
      });

      apiCall('getApprovedPosts', {}, (data) => {
        if (data.success && data.posts && data.posts.length > 0) { 
          localStorage.setItem('scck_posts', JSON.stringify(data.posts)); 
          postCache = data.posts; 
          renderPostGrid(); 
        }
      });

      apiCall('getCommandHistory', {}, (data) => {
          if (data.success) {
              globalCommandData = data.eras;
              renderHallOfFame();
          } else {
              document.getElementById('hof-container').innerHTML = `<p style="text-align:center; color:red;">Failed to load archives.</p>`;
          }
      });
    };

    function renderLegacyGrid(classes) {
      const container = document.getElementById('legacy-grid-container');
      let html = '';
      classes.forEach(c => {
        const logo = c.logo ? `<img src="${c.logo}" class="class-logo">` : `<div class="class-logo" style="display:flex; align-items:center; justify-content:center; color:#555; font-size:40px;"><i class="fas fa-shield-alt"></i></div>`;
        html += `<div class="class-card" onclick="openClassModal('${c.id}')">${logo}<div class="class-year">CLASS OF ${c.year}</div><h3 class="class-name">${c.name}</h3></div>`;
      });
      container.innerHTML = html;
    }

    function renderPostGrid() {
      const container = document.getElementById('post-grid-container');
      if(!postCache || postCache.length === 0) {
          container.innerHTML = '<p style="text-align:center; width:100%; color:var(--text-muted);">No public activities posted yet.</p>';
          return;
      }

      let sortedPosts = [...postCache].sort((a, b) => {
          let aPin = (a.pinned === true || a.pinned === "TRUE") ? 1 : 0;
          let bPin = (b.pinned === true || b.pinned === "TRUE") ? 1 : 0;
          return bPin - aPin;
      });

      const totalPages = Math.ceil(sortedPosts.length / POSTS_PER_PAGE);
      if (currentPostPage > totalPages) currentPostPage = totalPages || 1;
      
      const startIdx = (currentPostPage - 1) * POSTS_PER_PAGE;
      const endIdx = startIdx + POSTS_PER_PAGE;
      const currentPosts = sortedPosts.slice(startIdx, endIdx);

      let gridHtml = '<div class="post-grid">';
      currentPosts.forEach(p => {
        const coverImg = p.image ? p.image.split(',')[0] : '';
        
        let imgHtml = '';
        if (coverImg) {
            imgHtml = `<img src="${coverImg}" class="post-img">`;
        } else if (p.videoUrl) {
            imgHtml = `<div style="display:flex; height:100%; align-items:center; justify-content:center; background:#111; color:var(--army-gold);"><i class="fas fa-play-circle" style="font-size:50px;"></i></div>`;
        } else {
            imgHtml = `<div style="display:flex; height:100%; align-items:center; justify-content:center; background:#111;"><i class="fas fa-camera" style="font-size:40px; color:#333;"></i></div>`;
        }
        
        let badgesHtml = '';
        if (p.image && p.image.split(',').length > 1) {
            badgesHtml += `<div style="position:absolute; top:15px; right:15px; background:rgba(0,0,0,0.75); color:white; padding:6px 12px; border-radius:6px; font-size:12px; font-weight:bold; backdrop-filter:blur(4px); z-index:2;"><i class="fas fa-images"></i> ${p.image.split(',').length}</div>`;
        }
        if (p.videoUrl) {
            badgesHtml += `<div style="position:absolute; top:15px; right:15px; background:rgba(2, 136, 209, 0.9); color:#fff; padding:6px 12px; border-radius:6px; font-size:12px; font-weight:bold; backdrop-filter:blur(4px); z-index:2; box-shadow: 0 4px 10px rgba(0,0,0,0.5);"><i class="fas fa-video"></i> VIDEO</div>`;
        }
        if (p.pinned === true || p.pinned === "TRUE") {
            badgesHtml += `<div style="position:absolute; top:15px; left:15px; background:rgba(212, 175, 55, 0.9); color:#000; padding:6px 12px; border-radius:6px; font-size:12px; font-weight:bold; backdrop-filter:blur(4px); z-index:2; box-shadow: 0 4px 10px rgba(0,0,0,0.5);"><i class="fas fa-thumbtack"></i> PINNED</div>`;
        }

        const styledDesc = formatHashtags(p.description);

        gridHtml += `
        <div class="post-card" style="position:relative;">
          <div class="post-img-container">
            ${badgesHtml}
            ${imgHtml}
          </div>
          <div class="post-content">
            <div class="post-date">${p.date}</div>
            <h3 class="post-title">${p.title}</h3>
            <p class="post-desc">${styledDesc}</p>
            <button class="read-more-btn" onclick="openPostModal('${p.id}')">READ FULL REPORT</button>
          </div>
        </div>`;
      });
      gridHtml += '</div>';

      if (totalPages > 1) {
          let prevDisabled = currentPostPage === 1 ? 'disabled' : '';
          let nextDisabled = currentPostPage === totalPages ? 'disabled' : '';
          gridHtml += `
            <div class="pagination-wrap">
              <button class="page-btn" onclick="changePostPage(-1)" ${prevDisabled}><i class="fas fa-chevron-left"></i> PREV</button>
              <span class="page-indicator">PAGE ${currentPostPage} OF ${totalPages}</span>
              <button class="page-btn" onclick="changePostPage(1)" ${nextDisabled}>NEXT <i class="fas fa-chevron-right"></i></button>
            </div>
          `;
      }

      container.innerHTML = gridHtml;
    }

    window.changePostPage = function(direction) {
        currentPostPage += direction;
        renderPostGrid();
        document.getElementById('showcase-section').scrollIntoView({ behavior: 'smooth' });
    }

    // ─── HALL OF FAME RENDER (FLOATING LAYOUT) ──────────────────────────
    function renderHallOfFame() {
        const container = document.getElementById('hof-container');
        if (!globalCommandData || globalCommandData.length === 0) {
            container.innerHTML = `<p style="text-align:center; color:var(--text-muted);">No historical records found.</p>`;
            return;
        }

        let html = '';
        
        globalCommandData.forEach((era, index) => {
            if (index > 0 && era.status === "Past" && globalCommandData[index-1].status === "Current") {
                html += `<div class="hof-divider"><span>ARCHIVED ERAS</span></div>`;
            }

            let imgCmd = era.image || 'https://cdn-icons-png.flaticon.com/512/1055/1055664.png';
            let tenureTxtCmd = era.status === "Posthumous" ? `<i class="fas fa-ribbon"></i> IN MEMORIAM` : era.tenure;

            html += `
            <div class="hof-era-block">
              <div class="hof-floating-container" onclick="openCinematicDossier('${era.id}')">
                <img src="${imgCmd}" class="hof-portrait" alt="${era.name}">
                <div class="hof-role">UNIT COMMANDANT • ${tenureTxtCmd}</div>
                <div class="hof-name">${era.rank} ${era.name}</div>
              </div>
            `;

            if (era.corpsCommanders && era.corpsCommanders.length > 0) {
                // Faint divider separating Commandant from Corps Commanders
                html += `<div style="width: 80px; height: 2px; background: var(--army-gold); margin: 20px auto 40px auto; opacity: 0.3;"></div>`;
                html += `<div class="hof-cc-grid">`;
                
                era.corpsCommanders.forEach(cc => {
                    let imgCc = cc.image || 'https://cdn-icons-png.flaticon.com/512/1055/1055664.png';
                    let tenureTxtCc = cc.status === "Posthumous" ? `<i class="fas fa-ribbon"></i> IN MEMORIAM` : cc.tenure;

                    html += `
                    <div class="hof-cc-container" onclick="openDossier('${cc.id}', true, '${era.id}')">
                      <img src="${imgCc}" class="hof-cc-portrait" alt="${cc.name}">
                      <div class="hof-cc-role">CORPS COMMANDER • ${tenureTxtCc}</div>
                      <div class="hof-cc-name">${cc.rank} ${cc.name}</div>
                    </div>`;
                });
                html += `</div>`; 
            }
            html += `</div>`; 
        });

        container.innerHTML = html;
    }

    // ─── CINEMATIC MODAL ENGINE (COMMANDANTS ONLY) ──────────────────────
    window.openCinematicDossier = function(id) {
        let person = globalCommandData.find(e => e.id === id);
        if (!person) return;

        let formattedBio = person.bio ? person.bio.replace(/- /g, "• ") : '<span style="font-style:italic; opacity:0.6;">No biography recorded.</span>';
        let imgHtml = person.image ? `<img src="${person.image}" class="cinematic-hero-img">` : `<div style="display:flex; height:100%; align-items:center; justify-content:center; font-size:150px; color:#333;"><i class="fas fa-user"></i></div>`;
        let quoteText = person.quote ? `"${person.quote}"` : "Leadership • Discipline • Excellence";

        document.getElementById('cine-rank').innerText = `${person.rank} • UNIT COMMANDANT`;
        document.getElementById('cine-name').innerText = person.name;
        document.getElementById('cine-quote').innerText = quoteText;
        document.getElementById('cine-bio').innerHTML = formattedBio;
        document.getElementById('cine-img-container').innerHTML = imgHtml;

        const modal = document.getElementById('cinematic-modal');
        modal.style.display = 'flex';
        document.body.style.overflow = 'hidden'; // Prevent background scrolling
        setTimeout(() => modal.classList.add('show'), 10);
    }

    window.closeCinematicDossier = function(force) {
        const modal = document.getElementById('cinematic-modal');
        if (force === true || force.target === modal) {
            modal.classList.remove('show');
            document.body.style.overflow = ''; 
            setTimeout(() => modal.style.display = 'none', 500);
        }
    }

    // ─── STANDARD DOSSIER MODAL ENGINE (CORPS COMMANDERS ONLY) ──────────
    window.openDossier = function(id, isCorpsCommander = false, parentId = null) {
        let person = null;
        if (isCorpsCommander) {
            let era = globalCommandData.find(e => e.id === parentId);
            if (era) { person = era.corpsCommanders.find(c => c.id === id); }
        }
        if (!person) return;

        let formattedBio = person.bio ? person.bio.replace(/- /g, "• ") : '<div class="dossier-bio" style="font-style:italic; opacity:0.6;">No biography recorded.</div>';
        const photo = person.image ? `<img src="${person.image}" class="dossier-img">` : `<div style="display:flex; height:350px; align-items:center; justify-content:center; color:#555; font-size:60px; width:100%;"><i class="fas fa-user"></i></div>`;

        const html = `
          <div class="dossier-layout">
             <div class="dossier-img-wrap">${photo}</div>
             <div class="dossier-info">
                <div class="dossier-rank">${person.rank}</div>
                <div class="dossier-name">${person.name}</div>
                <div class="dossier-meta"><i class="fas fa-shield-alt"></i> ${person.role}</div>
                <div class="dossier-meta"><i class="fas fa-clock"></i> ${person.tenure}</div>
                <div class="dossier-bio">${formattedBio}</div>
             </div>
          </div>
        `;
        document.getElementById('modal-dynamic-content').innerHTML = html;
        showModal();
    }


    let currentSlideIdx = 0;
    function openPostModal(postId) {
      const p = postCache.find(x => x.id === postId);
      if (!p) return;
      const images = p.image ? p.image.split(',') : [];
      currentSlideIdx = 0;
      
      let carouselHtml = '';
      let slidesArr = [];
      
      if (p.videoUrl) slidesArr.push(`<div class="carousel-slide" id="slide-${slidesArr.length}">${createEmbed(p.videoUrl)}</div>`);
      images.forEach(img => {
        if(img) slidesArr.push(`<div class="carousel-slide" id="slide-${slidesArr.length}"><img src="${img}"></div>`);
      });

      if (slidesArr.length > 0) {
          slidesArr[0] = slidesArr[0].replace('carousel-slide"', 'carousel-slide active"');
          let slides = slidesArr.join('');
          let btns = slidesArr.length > 1 ? `<button class="carousel-btn carousel-prev" onclick="changeSlide(-1, ${slidesArr.length})"><i class="fas fa-chevron-left"></i></button><button class="carousel-btn carousel-next" onclick="changeSlide(1, ${slidesArr.length})"><i class="fas fa-chevron-right"></i></button>` : '';
          let dots = slidesArr.length > 1 ? `<div class="carousel-dots">` + slidesArr.map((_, i) => `<span class="dot ${i === 0 ? 'active' : ''}" id="dot-${i}" onclick="setSlide(${i}, ${slidesArr.length})"></span>`).join('') + `</div>` : '';
          carouselHtml = `<div class="carousel-container">${slides}${btns}${dots}</div>`;
      }
      
      const styledDesc = formatHashtags(p.description);
      document.getElementById('modal-dynamic-content').innerHTML = `${carouselHtml}<div class="full-post-date">${p.date}</div><h2 class="full-post-title">${p.title}</h2><div class="full-post-desc">${styledDesc}</div>`;
      showModal();
    }

    window.changeSlide = function(step, total) { setSlide(currentSlideIdx + step, total); }
    window.setSlide = function(index, total) {
      if(index >= total) index = 0;
      if(index < 0) index = total - 1;
      document.querySelectorAll('.carousel-slide').forEach(s => s.classList.remove('active'));
      document.querySelectorAll('.dot').forEach(d => d.classList.remove('active'));
      document.getElementById(`slide-${index}`).classList.add('active');
      if (document.getElementById(`dot-${index}`)) document.getElementById(`dot-${index}`).classList.add('active');
      currentSlideIdx = index;
    }

    function openClassModal(classId) {
      const cls = legacyCache.find(c => c.id === classId);
      if (!cls) return;
      let oHtml = '';
      if (cls.officers.length === 0) {
        oHtml = '<p style="text-align:center; width:100%; color:var(--text-muted); margin-top:30px;">Officer records pending.</p>';
      } else {
        cls.officers.forEach(o => {
          const photo = o.image ? `<img src="${o.image}" class="officer-photo">` : `<div class="officer-photo" style="display:flex; align-items:center; justify-content:center; color:#555; font-size:30px;"><i class="fas fa-user"></i></div>`;
          oHtml += `<div class="officer-card" onclick="openOfficerDossier('${classId}', '${o.id}')">${photo}<div class="officer-rank">${o.rank}</div><div class="officer-name">${o.name}</div><div class="officer-desig">${o.designation}</div></div>`;
        });
      }
      document.getElementById('modal-dynamic-content').innerHTML = `<div style="text-align: center; border-bottom: 1px solid var(--border-color); padding-bottom: 20px;"><h2 style="color: var(--army-gold); font-size: 32px; font-family:'Oswald',sans-serif; text-transform:uppercase; letter-spacing: 2px;">${cls.name} (${cls.year})</h2></div><div class="officer-grid">${oHtml}</div>`;
      showModal();
    }

    window.openOfficerDossier = function(classId, officerId) {
      const cls = legacyCache.find(c => c.id === classId);
      if (!cls) return;
      const off = cls.officers.find(o => o.id === officerId);
      if (!off) return;

      const photo = off.image ? `<img src="${off.image}" class="dossier-img">` : `<div style="display:flex; height:350px; align-items:center; justify-content:center; color:#555; font-size:60px; width:100%;"><i class="fas fa-user"></i></div>`;
      const courseHtml = off.course ? `<div class="dossier-meta"><i class="fas fa-graduation-cap"></i> ${off.course}</div>` : '';
      const bioHtml = off.bio ? `<div class="dossier-bio">${off.bio}</div>` : '<div class="dossier-bio" style="font-style:italic; opacity:0.6;">No biography recorded for this officer.</div>';

      const html = `
        <button class="dossier-back-btn" onclick="openClassModal('${classId}')"><i class="fas fa-arrow-left"></i> BACK TO CLASS</button>
        <div class="dossier-layout">
           <div class="dossier-img-wrap">${photo}</div>
           <div class="dossier-info">
              <div class="dossier-rank">${off.rank}</div>
              <div class="dossier-name">${off.name}</div>
              ${courseHtml}
              <div class="dossier-meta"><i class="fas fa-shield-alt"></i> ${off.designation}</div>
              <div class="dossier-meta"><i class="fas fa-landmark"></i> ${cls.name} (${cls.year})</div>
              ${bioHtml}
           </div>
        </div>
      `;
      document.getElementById('modal-dynamic-content').innerHTML = html;
    }

    function showModal() {
      const modal = document.getElementById('public-modal');
      modal.style.display = 'flex';
      setTimeout(() => modal.classList.add('show'), 10);
    }

    function closeModal(force) {
      const modal = document.getElementById('public-modal');
      if (force === true || force.target === modal) {
        modal.classList.remove('show');
        setTimeout(() => modal.style.display = 'none', 300);
        const iframe = modal.querySelector('iframe');
        if (iframe) {
            let iframeSrc = iframe.src;
            iframe.src = iframeSrc; 
        }
      }
    }
  </script>
</body>
</html>
