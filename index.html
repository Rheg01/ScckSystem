<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SCCK ROTC Unit - Official Site</title>

  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    :root { --army-dark: #1b2015; --army-primary: #2d3821; --army-gold: #d4af37; --card-bg: #1e2418; }
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
    h1, h2, h3, button, .nav-links a { font-family: 'Oswald', sans-serif; text-transform: uppercase; letter-spacing: 1px; }
    body { background: var(--army-dark); color: white; overflow-x: hidden; scroll-behavior: smooth; }

    /* AFP STYLE HEADER */
    .header { position: fixed; top: 0; left: 0; width: 100%; padding: 12px 40px; display: flex; justify-content: space-between; align-items: center; z-index: 30000; background: rgba(15, 18, 12, 0.95); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255, 255, 255, 0.1); transition: all 0.3s ease; }
    .header .logo-group { display: flex; align-items: center; gap: 15px; text-decoration: none; }
    .header .logo-group img { width: 50px; height: 50px; object-fit: contain; }
    .logo-text { display: flex; flex-direction: column; justify-content: center; }
    .logo-text .line1 { font-family: 'Inter', sans-serif; font-size: 16px; font-weight: 800; color: #ffffff; letter-spacing: 0.5px; }
    .logo-text .line2 { font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 500; color: #b0bec5; letter-spacing: 0.5px; margin-top: -2px; }
    
    .nav-links { display: flex; gap: 30px; align-items: center; }
    .nav-links a { color: #ffffff; text-decoration: none; font-size: 14px; font-weight: 500; transition: color 0.3s; position: relative; font-family: 'Inter', sans-serif; }
    .nav-links a:hover { color: var(--army-gold); }
    .nav-btn { background: var(--army-gold); color: var(--army-dark) !important; padding: 8px 20px; border-radius: 4px; font-weight: 700; transition: all 0.3s; border: 1px solid transparent; font-family: 'Oswald', sans-serif !important;}
    .nav-btn:hover { background: transparent; color: var(--army-gold) !important; border: 1px solid var(--army-gold); }

    /* HERO SECTION */
    .landing-hero { position: relative; min-height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 20px; overflow: hidden; margin-top: 0; }
    .landing-bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-image: linear-gradient(rgba(10, 12, 8, 0.7), rgba(10, 12, 8, 0.7)), radial-gradient(circle at center, var(--army-primary) 0%, #0a0c08 100%); background-size: cover; background-position: center; z-index: 0; animation: breathe 15s infinite alternate ease-in-out; }
    @keyframes breathe { 0% { transform: scale(1); } 100% { transform: scale(1.05); } }
    
    .landing-content { position: relative; z-index: 1; max-width: 800px; background: rgba(15, 18, 12, 0.90); padding: 50px; border-radius: 12px; border: 1px solid rgba(212, 175, 55, 0.2); backdrop-filter: blur(10px); box-shadow: 0 20px 50px rgba(0,0,0,0.5); border-top: 4px solid var(--army-gold); animation: fadeUp 1.2s cubic-bezier(0.16, 1, 0.3, 1); }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(40px); } to { opacity: 1; transform: translateY(0); } }
    .landing-content img { width: 120px; height: 120px; margin-bottom: 20px; filter: drop-shadow(0 0 15px rgba(212, 175, 55, 0.4)); display:none; object-fit: contain; }
    .landing-content h1 { font-size: 48px; color: var(--army-gold); margin-bottom: 10px; letter-spacing: 2px; text-shadow: 0 4px 10px rgba(0,0,0,0.8); }
    .landing-content h3 { font-size: 18px; color: #dce0d5; margin-bottom: 30px; font-weight: 400; letter-spacing: 4px; }
    .btn-enter { background: var(--army-gold); color: var(--army-dark); font-size: 18px; font-weight: bold; padding: 18px 40px; border-radius: 6px; border: none; cursor: pointer; transition: all 0.3s; text-transform: uppercase; box-shadow: 0 4px 15px rgba(212, 175, 55, 0.3); text-decoration: none; display: inline-block; }
    .btn-enter:hover { background: #ebd575; transform: translateY(-3px); box-shadow: 0 8px 25px rgba(212, 175, 55, 0.5); }
    
    /* SHOWCASE NEWSFEED SECTION */
    .landing-showcase { position: relative; z-index: 1; background: #0a0c08; padding: 120px 20px; min-height: 60vh; border-bottom: 1px solid #1e2418;}
    .section-title { color: var(--army-gold); font-size: 32px; margin-bottom: 40px; text-align: center; border-bottom: 2px solid rgba(212, 175, 55, 0.3); padding-bottom: 15px; max-width: 900px; margin-left: auto; margin-right: auto;}
    .post-grid { max-width: 1100px; margin: 0 auto; display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; }
    .post-card { background: var(--card-bg); border: 1px solid #2a3322; border-radius: 10px; overflow: hidden; display: flex; flex-direction: column; transition: transform 0.3s; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
    .post-card:hover { transform: translateY(-8px); border-color: rgba(212, 175, 55, 0.4); }
    .post-img { width: 100%; height: 200px; object-fit: cover; border-bottom: 2px solid var(--army-gold); }
    .post-content { padding: 25px; display: flex; flex-direction: column; flex: 1; }
    .post-date { font-family: 'Inter', sans-serif; font-size: 12px; color: var(--army-gold); font-weight: bold; margin-bottom: 10px; letter-spacing: 1px; }
    .post-title { font-size: 22px; color: #fff; margin-bottom: 15px; line-height: 1.2; }
    .post-desc { font-family: 'Inter', sans-serif; font-size: 14px; color: #b0bec5; line-height: 1.6; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; margin-bottom: 20px; flex: 1; }
    .read-more-btn { background: transparent; color: var(--army-gold); border: 1px solid var(--army-gold); padding: 10px 15px; border-radius: 4px; font-size: 13px; font-family: 'Oswald', sans-serif; cursor: pointer; transition: 0.3s; text-transform: uppercase; font-weight: bold; width: 100%; }
    .read-more-btn:hover { background: var(--army-gold); color: var(--army-dark); }

    /* IMAGE CAROUSEL STYLES */
    .carousel-container { position: relative; width: 100%; max-height: 450px; background: #000; border-radius: 8px; margin-bottom: 25px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
    .carousel-slide { display: none; width: 100%; height: 100%; text-align: center; }
    .carousel-slide.active { display: block; animation: fade 0.5s ease-in-out; }
    @keyframes fade { from { opacity: 0.4; } to { opacity: 1; } }
    .carousel-slide img { max-width: 100%; max-height: 450px; object-fit: contain; }
    .carousel-btn { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(0,0,0,0.7); color: white; border: none; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; font-size: 18px; transition: 0.3s; z-index: 10; display: flex; align-items: center; justify-content: center; }
    .carousel-btn:hover { background: var(--army-gold); color: black; }
    .carousel-prev { left: 15px; }
    .carousel-next { right: 15px; }
    .carousel-dots { position: absolute; bottom: 15px; width: 100%; text-align: center; z-index: 10; }
    .dot { display: inline-block; width: 8px; height: 8px; background: rgba(255,255,255,0.4); border-radius: 50%; margin: 0 5px; cursor: pointer; transition: 0.3s; }
    .dot.active { background: var(--army-gold); transform: scale(1.3); }

    /* MODALS */
    .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); backdrop-filter: blur(8px); z-index: 40000; display: none; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.3s ease; }
    .modal-overlay.show { display: flex; opacity: 1; }
    .modal-content { background: var(--card-bg); width: 90%; max-width: 800px; max-height: 85vh; overflow-y: auto; border-radius: 12px; padding: 40px; border: 2px solid var(--army-gold); position: relative; transform: scale(0.95) translateY(20px); transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1); box-shadow: 0 20px 60px rgba(0,0,0,0.7); }
    .modal-overlay.show .modal-content { transform: scale(1) translateY(0); }
    .close-btn { position: absolute; top: 20px; right: 25px; font-size: 28px; color: #9aa08f; cursor: pointer; transition: 0.2s; z-index: 10;}
    .close-btn:hover { color: #ef5350; transform: rotate(90deg); }
    
    .full-post-date { font-family: 'Inter', sans-serif; font-size: 13px; color: var(--army-gold); font-weight: bold; margin-bottom: 5px; }
    .full-post-title { font-size: 32px; color: #fff; margin-bottom: 20px; line-height: 1.2; border-bottom: 1px solid #3a4230; padding-bottom: 15px;}
    .full-post-desc { font-family: 'Inter', sans-serif; font-size: 16px; color: #dce0d5; line-height: 1.8; white-space: pre-wrap; }

    /* LEGACY GALLERY SECTION */
    .landing-legacy { position: relative; z-index: 1; background: var(--army-dark); padding: 120px 20px; min-height: 50vh; }
    .legacy-grid { max-width: 1000px; margin: 0 auto; display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 40px; }
    .class-card { background: transparent; border: none; padding: 20px; text-align: center; cursor: pointer; transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1); display: flex; flex-direction: column; align-items: center; }
    .class-card:hover { transform: translateY(-15px) scale(1.05); }
    .class-logo { width: 160px; height: 160px; object-fit: contain; margin-bottom: 20px; filter: drop-shadow(0 10px 15px rgba(0,0,0,0.8)); transition: transform 0.4s ease, filter 0.4s ease; }
    .class-card:hover .class-logo { transform: scale(1.1); filter: drop-shadow(0 15px 25px rgba(212, 175, 55, 0.6)); }
    .class-year { font-size: 14px; color: var(--army-gold); font-weight: bold; margin-bottom: 5px; letter-spacing: 2px; }
    .class-name { font-size: 26px; color: #ffffff; text-shadow: 0 4px 10px rgba(0,0,0,0.5); }
    .officer-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 25px; margin-top:20px; }
    .officer-card { text-align: center; background: #12140e; padding: 20px; border-radius: 8px; border: 1px solid #3a4230; transition: transform 0.3s; }
    .officer-card:hover { transform: translateY(-5px); border-color: rgba(212, 175, 55, 0.5); }
    .officer-photo { width: 120px; height: 120px; border-radius: 50%; object-fit: cover; border: 3px solid var(--army-gold); margin: 0 auto 15px auto; background: #000; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
    .officer-rank { font-size: 12px; color: var(--army-gold); font-weight: bold; letter-spacing: 1px; margin-bottom: 5px; }
    .officer-name { font-size: 16px; color: white; font-weight: bold; margin-bottom: 5px; font-family: 'Oswald', sans-serif;}
    .officer-desig { font-size: 12px; color: #9aa08f; }

    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: var(--army-dark); border-radius: 4px; }
    ::-webkit-scrollbar-thumb { background: var(--army-gold); border-radius: 4px; }

    @media (max-width: 768px) {
      .header { padding: 15px 20px; }
      .nav-links a.hide-mobile { display: none; }
      .landing-content h1 { font-size: 36px; }
      .modal-content { padding: 20px; }
      .logo-text .line1 { font-size: 14px; }
      .logo-text .line2 { font-size: 11px; }
    }
  </style>
</head>
<body>

  <header class="header" id="navbar">
    <a href="#" class="logo-group">
      <img src="https://cdn-icons-png.flaticon.com/512/1055/1055664.png" id="nav-logo" alt="Logo">
      <div class="logo-text">
        <span class="line1">ST. CLARE COLLEGE OF KALOOKAN</span>
        <span class="line2">ROTC UNIT</span>
      </div>
    </a>
    <nav class="nav-links">
      <a href="#hero" class="hide-mobile">Home</a>
      <a href="#showcase-section" class="hide-mobile">Activities</a>
      <a href="#legacy-section" class="hide-mobile">Legacy</a>
      <a href="app.html" class="nav-btn"><i class="fas fa-lock"></i> Portal</a>
    </nav>
  </header>

  <div class="landing-hero" id="hero">
    <div class="landing-bg" id="landing-bg-img"></div>
    <div class="landing-content">
      <img src="" id="system-logo-landing" alt="SCCK Logo">
      <h1>SCCK ROTC UNIT</h1>
      <h3>LEADERSHIP • DISCIPLINE • EXCELLENCE</h3>
      <a href="app.html" class="btn-enter"><i class="fas fa-shield-alt"></i> ENTER COMMAND CENTER</a>
    </div>
  </div>

  <div class="landing-showcase" id="showcase-section">
    <h2 class="section-title">CAPABILITIES & ACTIVITIES</h2>
    <div class="post-grid" id="post-grid-container">
      <p style="text-align:center; width:100%; color:#9aa08f;"><i class="fas fa-spinner fa-spin"></i> Retrieving intelligence reports...</p>
    </div>
  </div>

  <div class="landing-legacy" id="legacy-section">
    <h2 class="section-title">LEGACY OF LEADERS</h2>
    <div class="legacy-grid" id="legacy-grid-container">
      <p style="text-align:center; width:100%; color:#9aa08f;"><i class="fas fa-spinner fa-spin"></i> Retrieving archives...</p>
    </div>
  </div>

  <div class="modal-overlay" id="public-modal" onclick="closeModal(event)">
    <div class="modal-content" onclick="event.stopPropagation()">
      <i class="fas fa-times close-btn" onclick="closeModal(true)"></i>
      <div id="modal-dynamic-content"></div>
    </div>
  </div>

  <script>
    // ⚠️ PASTE YOUR GOOGLE APPS SCRIPT WEB APP URL HERE:
    const GAS_API_URL = "https://script.google.com/macros/s/AKfycbw63y63Mk-wyqa1a846oBhnDTHj29dUEJznvrG52sjEtwONa6kOEzDVCy_GlnAMqPXPAg/exec";

    let legacyCache = [];
    let postCache = [];

    // Helper to bypass CORS blocks
    function apiCall(action, payload, onSuccess, onFailure) {
      payload.action = action;
      fetch(GAS_API_URL, { 
        method: 'POST', 
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify(payload) 
      })
      .then(response => response.json())
      .then(data => { if (data.error && !data.success && data.message) throw new Error(data.message); onSuccess(data); })
      .catch(error => { console.error("API Error:", error); if (onFailure) onFailure(error); });
    }

    window.onloa

      apiCall('getApprovedPosts', {}, (data) => {
        if (data.success && data.posts) { postCache = data.posts; renderPostGrid(data.posts); }
      });
    };

    function renderPostGrid(posts) {
      const container = document.getElementById('post-grid-container');
      if (posts.length === 0) return container.innerHTML = '<p style="text-align:center; width:100%; color:#9aa08f;">No public activities posted yet.</p>';
      
      let html = '';
      posts.forEach(p => {
        const coverImg = p.image ? p.image.split(',')[0] : '';
        const img = coverImg ? `<img src="${coverImg}" class="post-img">` : `<div class="post-img" style="display:flex; align-items:center; justify-content:center; background:#111;"><i class="fas fa-camera" style="font-size:40px; color:#333;"></i></div>`;
        const iconBadge = p.image && p.image.split(',').length > 1 ? `<div style="position:absolute; top:10px; right:10px; background:rgba(0,0,0,0.6); padding:5px 10px; border-radius:4px; font-size:12px;"><i class="fas fa-images"></i> ${p.image.split(',').length}</div>` : '';
        
        html += `
          <div class="post-card" style="position:relative;">
            ${iconBadge}
            ${img}
            <div class="post-content">
              <div class="post-date">${p.date}</div>
              <h3 class="post-title">${p.title}</h3>
              <p class="post-desc">${p.description}</p>
              <button class="read-more-btn" onclick="openPostModal('${p.id}')">READ FULL REPORT</button>
            </div>
          </div>
        `;
      });
      container.innerHTML = html;
    }

    let currentSlideIdx = 0;
    
    function openPostModal(postId) {
      const p = postCache.find(x => x.id === postId);
      if (!p) return;
      
      const images = p.image ? p.image.split(',') : [];
      currentSlideIdx = 0;
      let carouselHtml = '';
      
      if (images.length > 0) {
        let slides = images.map((img, i) => `<div class="carousel-slide ${i === 0 ? 'active' : ''}" id="slide-${i}"><img src="${img}"></div>`).join('');
        let btns = images.length > 1 ? `<button class="carousel-btn carousel-prev" onclick="changeSlide(-1, ${images.length})"><i class="fas fa-chevron-left"></i></button><button class="carousel-btn carousel-next" onclick="changeSlide(1, ${images.length})"><i class="fas fa-chevron-right"></i></button>` : '';
        let dots = images.length > 1 ? `<div class="carousel-dots">` + images.map((_, i) => `<span class="dot ${i === 0 ? 'active' : ''}" id="dot-${i}" onclick="setSlide(${i}, ${images.length})"></span>`).join('') + `</div>` : '';
        carouselHtml = `<div class="carousel-container">${slides}${btns}${dots}</div>`;
      }
      
      const html = `
        ${carouselHtml}
        <div class="full-post-date">${p.date}</div>
        <h2 class="full-post-title">${p.title}</h2>
        <div class="full-post-desc">${p.description}</div>
      `;
      
      document.getElementById('modal-dynamic-content').innerHTML = html;
      showModal();
    }

    window.changeSlide = function(step, total) { setSlide(currentSlideIdx + step, total); }
    window.setSlide = function(index, total) {
      if(index >= total) index = 0;
      if(index < 0) index = total - 1;
      document.querySelectorAll('.carousel-slide').forEach(s => s.classList.remove('active'));
      document.querySelectorAll('.dot').forEach(d => d.classList.remove('active'));
      document.getElementById(`slide-${index}`).classList.add('active');
      if (document.getElementById(`dot-${index}`)) document.getElementById(`dot-${index}`).classList.add('active');
      currentSlideIdx = index;
    }

    function openClassModal(classId) {
      const cls = legacyCache.find(c => c.id === classId);
      if (!cls) return;
      let oHtml = '';
      if (cls.officers.length === 0) {
        oHtml = '<p style="text-align:center; width:100%; color:#9aa08f; margin-top:30px;">Officer records pending.</p>';
      } else {
        cls.officers.forEach(o => {
          const photo = o.image ? `<img src="${o.image}" class="officer-photo">` : `<div class="officer-photo" style="display:flex; align-items:center; justify-content:center; color:#555; font-size:30px;"><i class="fas fa-user"></i></div>`;
          oHtml += `<div class="officer-card">${photo}<div class="officer-rank">${o.rank}</div><div class="officer-name">${o.name}</div><div class="officer-desig">${o.designation}</div></div>`;
        });
      }
      
      const html = `
        <div style="text-align: center; border-bottom: 1px solid #3a4230; padding-bottom: 20px;">
          <h2 style="color: var(--army-gold); font-size: 32px; font-family:'Oswald',sans-serif; text-transform:uppercase; letter-spacing: 2px;">${cls.name} (${cls.year})</h2>
        </div>
        <div class="officer-grid">${oHtml}</div>
      `;
      
      document.getElementById('modal-dynamic-content').innerHTML = html;
      showModal();
    }

    function showModal() {
      const modal = document.getElementById('public-modal');
      modal.style.display = 'flex';
      setTimeout(() => modal.classList.add('show'), 10);
    }

    function closeModal(force) {
      const modal = document.getElementById('public-modal');
      if (force === true || force.target === modal) {
        modal.classList.remove('show');
        setTimeout(() => modal.style.display = 'none', 300);
      }
    }
  </script>

</body>
</html>
